let current = 0;

function render() {
  const s = steps[current];
  const c = document.getElementById('stepContainer');
  let html = '';

  if (s.part) html += `<div class="part-label">${s.part}</div>`;

  html += '<div class="step-header">';
  if (s.pill) html += `<span class="pill ${s.pill[0]}">${s.pill[1]}</span>`;
  html += `<span class="step-title">${s.title}</span>`;
  html += '</div>';

  if (s.subtitle) html += `<p class="step-subtitle">${s.subtitle}</p>`;
  if (s.principle) {
    html += `<div class="principle-box"><h3>🔑 ${s.principle.title}</h3><p>${s.principle.text}</p></div>`;
  }
  if (s.pattern) {
    html += `<div class="pattern-box"><h3>💡 ${s.pattern.title}</h3><p>${s.pattern.text}</p></div>`;
  }

  const isFull = s.panels === 'full';
  html += `<div class="panels ${isFull ? 'panel-full' : ''}">`;

  // Left panel
  if (s.left) {
    html += '<div class="panel">';
    if (s.left.label && s.left.label[1]) {
      html += `<div class="panel-label ${s.left.label[0]}">${s.left.label[1]}</div>`;
    }
    if (s.left.code) {
      html += `<div class="code-block">${s.left.code}</div>`;
    }
    if (s.left.diagram) {
      html += `<div class="diagram-area">${s.left.diagram}</div>`;
    }
    html += '</div>';
  }

  // Right panel
  if (s.right && !isFull) {
    html += '<div class="panel">';
    if (s.right.label && s.right.label[1]) {
      html += `<div class="panel-label ${s.right.label[0]}">${s.right.label[1]}</div>`;
    }
    if (s.right.code) {
      html += `<div class="code-block">${s.right.code}</div>`;
    }
    if (s.right.diagram) {
      html += `<div class="diagram-area">${s.right.diagram}</div>`;
    }
    html += '</div>';
  }

  html += '</div>';

  if (s.callout) {
    html += `<div class="callout ${s.callout[0]}">${s.callout[1]}</div>`;
  }

  c.innerHTML = html;
  c.style.animation = 'none';
  c.offsetHeight;
  c.style.animation = 'fadeSlide 0.35s ease';

  // Update progress
  const pct = ((current + 1) / steps.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('stepCounter').textContent = `${current + 1} / ${steps.length}`;

  // Update buttons
  document.getElementById('backBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === steps.length - 1;

  // Update dots
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  for (let i = 0; i < steps.length; i++) {
    const d = document.createElement('button');
    d.className = 'dot' + (i === current ? ' active' : '');
    d.onclick = () => { current = i; render(); };
    d.title = `Step ${i + 1}`;
    dotsEl.appendChild(d);
  }
}

function go(dir) {
  const next = current + dir;
  if (next >= 0 && next < steps.length) {
    current = next;
    render();
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(1);
  if (e.key === 'ArrowLeft') go(-1);
});

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.querySelector('.theme-toggle').textContent = isDark ? '🌙' : '☀️';
}

render();
</script>
