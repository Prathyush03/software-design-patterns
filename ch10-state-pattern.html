<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter 10 — The State Pattern</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f6f5f1;
  --bg-tertiary: #edeae3;
  --bg-info: #e8f0fe;
  --bg-danger: #fde8e8;
  --bg-success: #e6f5ec;
  --bg-warning: #fef6e0;
  --text-primary: #1a1a1a;
  --text-secondary: #4a4a4a;
  --text-tertiary: #7a7a7a;
  --text-info: #1a56db;
  --text-danger: #c53030;
  --text-success: #276749;
  --text-warning: #92400e;
  --border-tertiary: #e2dfd8;
  --border-secondary: #d1cdc4;
  --purple-50: #faf5ff; --purple-100: #f0e5ff; --purple-200: #dcc8ff;
  --purple-300: #c5a3ff; --purple-400: #a97cff; --purple-500: #8b5cf6;
  --purple-600: #7c3aed; --purple-700: #6d28d9; --purple-800: #5b21b6;
  --teal-50: #f0fdfa; --teal-100: #ccfbf1; --teal-200: #99f6e4;
  --teal-300: #5eead4; --teal-400: #2dd4bf; --teal-500: #14b8a6;
  --teal-600: #0d9488; --teal-700: #0f766e; --teal-800: #115e59;
  --coral-50: #fff5f5; --coral-100: #ffe3e3; --coral-200: #ffc9c9;
  --coral-300: #ffa8a8; --coral-400: #ff8787; --coral-500: #ff6b6b;
  --coral-600: #fa5252; --coral-700: #f03e3e; --coral-800: #e03131;
  --progress-bg: #e2dfd8;
  --progress-fill: #7c3aed;
  --code-bg: #1e1e2e;
  --code-text: #cdd6f4;
  --card-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --pill-gray-bg: #e5e5e5; --pill-gray-text: #525252;
  --pill-red-bg: #fecaca; --pill-red-text: #991b1b;
  --pill-yellow-bg: #fef08a; --pill-yellow-text: #854d0e;
  --pill-blue-bg: #bfdbfe; --pill-blue-text: #1e40af;
  --pill-green-bg: #bbf7d0; --pill-green-text: #166534;
  --pill-purple-bg: #e9d5ff; --pill-purple-text: #6b21a8;
}
[data-theme="dark"] {
  --bg-primary: #1c1c22;
  --bg-secondary: #25252d;
  --bg-tertiary: #16161b;
  --bg-info: #1a2744;
  --bg-danger: #3b1c1c;
  --bg-success: #1a3328;
  --bg-warning: #3b2e14;
  --text-primary: #e8e6e1;
  --text-secondary: #b0ada5;
  --text-tertiary: #7a776f;
  --text-info: #7aafff;
  --text-danger: #fca5a5;
  --text-success: #86efac;
  --text-warning: #fcd34d;
  --border-tertiary: #33333b;
  --border-secondary: #44444e;
  --purple-50: #1e1630; --purple-100: #2a1f4a; --purple-200: #3b2d6b;
  --purple-300: #5b3faa; --purple-400: #7c5ecf; --purple-500: #8b5cf6;
  --purple-600: #a78bfa; --purple-700: #c4b5fd; --purple-800: #ddd6fe;
  --teal-50: #0d2926; --teal-100: #134e4a; --teal-200: #1a6e68;
  --teal-300: #2dd4bf; --teal-400: #5eead4; --teal-500: #14b8a6;
  --teal-600: #2dd4bf; --teal-700: #5eead4; --teal-800: #99f6e4;
  --coral-50: #2d1a1a; --coral-100: #4a2020; --coral-200: #6b2c2c;
  --coral-300: #aa4040; --coral-400: #e06060; --coral-500: #ff6b6b;
  --coral-600: #ffa8a8; --coral-700: #ffc9c9; --coral-800: #ffe3e3;
  --progress-bg: #33333b;
  --progress-fill: #a78bfa;
  --code-bg: #11111b;
  --code-text: #cdd6f4;
  --card-shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --pill-gray-bg: #3f3f46; --pill-gray-text: #d4d4d8;
  --pill-red-bg: #4a1d1d; --pill-red-text: #fca5a5;
  --pill-yellow-bg: #4a3a14; --pill-yellow-text: #fde68a;
  --pill-blue-bg: #1e2f5a; --pill-blue-text: #93c5fd;
  --pill-green-bg: #14332a; --pill-green-text: #86efac;
  --pill-purple-bg: #2e1a4a; --pill-purple-text: #d8b4fe;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg-tertiary);
  color: var(--text-primary);
  line-height: 1.65;
  min-height: 100vh;
}
.container { max-width: 900px; margin: 0 auto; padding: 16px; }
.header {
  text-align: center; padding: 32px 20px 20px;
  border-bottom: 1px solid var(--border-tertiary);
  margin-bottom: 8px;
}
.header h1 {
  font-family: 'Fraunces', 'Georgia', serif;
  font-size: 1.7rem; font-weight: 700; margin-bottom: 4px;
  background: linear-gradient(135deg, var(--purple-600), var(--teal-500));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header .subtitle { color: var(--text-tertiary); font-size: 0.88rem; }
.progress-bar {
  width: 100%; height: 3px; background: var(--progress-bg);
  border-radius: 2px; margin: 12px 0 4px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--progress-fill);
  border-radius: 2px; transition: width 0.4s ease;
}
.theme-toggle {
  position: fixed; top: 14px; right: 14px; z-index: 100;
  background: var(--bg-secondary); border: 1px solid var(--border-tertiary);
  border-radius: 50%; width: 36px; height: 36px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; transition: background 0.2s;
}
.theme-toggle:hover { background: var(--bg-tertiary); }
.card {
  background: var(--bg-primary); border: 1px solid var(--border-tertiary);
  border-radius: 12px; padding: 28px 24px 20px;
  box-shadow: var(--card-shadow); min-height: 420px;
  animation: fadeSlide 0.35s ease;
}
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.step-label {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; margin-bottom: 10px;
}
.pill {
  display: inline-block; padding: 2px 10px; border-radius: 99px;
  font-size: 0.68rem; font-weight: 600; letter-spacing: 0.04em;
}
.pill-gray { background: var(--pill-gray-bg); color: var(--pill-gray-text); }
.pill-red { background: var(--pill-red-bg); color: var(--pill-red-text); }
.pill-yellow { background: var(--pill-yellow-bg); color: var(--pill-yellow-text); }
.pill-blue { background: var(--pill-blue-bg); color: var(--pill-blue-text); }
.pill-green { background: var(--pill-green-bg); color: var(--pill-green-text); }
.pill-purple { background: var(--pill-purple-bg); color: var(--pill-purple-text); }
.step-title {
  font-family: 'Fraunces', 'Georgia', serif;
  font-size: 1.25rem; font-weight: 700; margin-bottom: 12px;
  line-height: 1.3;
}
.step-desc { color: var(--text-secondary); font-size: 0.92rem; margin-bottom: 16px; }

/* Two panels side by side */
.panels { display: flex; gap: 14px; margin: 14px 0; }
.panel {
  flex: 1; background: var(--bg-secondary); border: 1px solid var(--border-tertiary);
  border-radius: 8px; overflow: hidden;
}
.panel-label {
  display: block; padding: 6px 12px; font-size: 0.7rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
  border-bottom: 1px solid var(--border-tertiary);
}
.panel-label.code-label { background: var(--code-bg); color: var(--code-text); }
.panel-label.diagram-label { background: var(--purple-50); color: var(--purple-700); }
.panel-label.before-label { background: var(--bg-danger); color: var(--text-danger); }
.panel-label.after-label { background: var(--bg-success); color: var(--text-success); }
.panel-body { padding: 12px; }

/* Code blocks */
pre.code-block {
  background: var(--code-bg); color: var(--code-text);
  font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 0.72rem; line-height: 1.7; padding: 14px;
  border-radius: 0 0 8px 8px; overflow-x: auto;
  white-space: pre; tab-size: 2;
}
.full-code { border-radius: 8px; }
.hi-r { background: rgba(239,68,68,0.18); display: inline; border-radius: 2px; padding: 0 2px; }
.hi-g { background: rgba(34,197,94,0.18); display: inline; border-radius: 2px; padding: 0 2px; }
.hi-y { background: rgba(234,179,8,0.18); display: inline; border-radius: 2px; padding: 0 2px; }
.hi-b { background: rgba(59,130,246,0.18); display: inline; border-radius: 2px; padding: 0 2px; }
.cm { color: #6c7086; font-style: italic; }

/* Class diagrams */
.cd-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: flex-start; margin: 8px 0; }
.cd-box {
  border: 2px solid var(--border-secondary); border-radius: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
  min-width: 130px; max-width: 190px; background: var(--bg-primary);
  overflow: hidden;
}
.cd-box.bad { border-color: var(--coral-500); background: var(--coral-50); }
.cd-box.dup { border-color: #eab308; background: var(--bg-warning); }
.cd-box.iface { border-style: dashed; border-color: var(--purple-500); background: var(--purple-50); }
.cd-box.ctx { border-color: var(--teal-500); background: var(--teal-50); }
.cd-box.obs { border-color: var(--coral-400); background: var(--coral-50); }
.cd-box.good { border-color: #22c55e; background: var(--bg-success); }
.cd-h {
  padding: 6px 8px; font-weight: 700; font-size: 0.72rem;
  border-bottom: 1px solid var(--border-tertiary);
  text-align: center;
}
.cd-b, .cd-m {
  padding: 4px 8px; font-size: 0.64rem; line-height: 1.5;
  border-bottom: 1px solid var(--border-tertiary);
}
.cd-m { border-bottom: none; }
.cd-arr {
  display: flex; align-items: center; justify-content: center;
  font-size: 0.72rem; color: var(--text-tertiary); padding: 4px 0;
  font-family: 'JetBrains Mono', monospace;
}

/* Principle box */
.principle-box {
  border: 2px solid var(--purple-400); background: var(--purple-50);
  border-radius: 8px; padding: 14px 16px; margin: 12px 0;
}
.principle-box .principle-tag {
  font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--purple-600); margin-bottom: 4px;
}
.principle-box .principle-text {
  font-family: 'Fraunces', 'Georgia', serif; font-size: 1.05rem;
  font-weight: 600; color: var(--purple-800);
}
[data-theme="dark"] .principle-box { background: var(--purple-50); border-color: var(--purple-400); }
[data-theme="dark"] .principle-box .principle-tag { color: var(--purple-600); }
[data-theme="dark"] .principle-box .principle-text { color: var(--purple-800); }

/* Callout bar */
.callout {
  border-left: 3px solid var(--border-secondary);
  padding: 10px 14px; margin-top: 16px;
  font-size: 0.85rem; color: var(--text-secondary);
}
.callout.info { border-color: var(--text-info); background: var(--bg-info); }
.callout.danger { border-color: var(--text-danger); background: var(--bg-danger); }
.callout.success { border-color: var(--text-success); background: var(--bg-success); }
.callout.warning { border-color: var(--text-warning); background: var(--bg-warning); }
.callout.purple { border-color: var(--purple-500); background: var(--purple-50); }

/* Nav */
.nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 0 8px; gap: 10px;
}
.nav-btn {
  font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 600;
  padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border-secondary);
  background: var(--bg-primary); color: var(--text-primary); cursor: pointer;
  transition: all 0.2s;
}
.nav-btn:hover:not(:disabled) { background: var(--bg-secondary); border-color: var(--purple-400); }
.nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.dots { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
.dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--border-secondary);
  cursor: pointer; transition: all 0.2s; border: none;
}
.dot.active { background: var(--purple-500); transform: scale(1.35); }
.dot:hover:not(.active) { background: var(--purple-300); }
.step-counter {
  text-align: center; font-size: 0.72rem; color: var(--text-tertiary);
  margin-top: 2px;
}

/* Toolbox grid */
.toolbox-grid { display: flex; gap: 16px; margin: 12px 0; }
.toolbox-col { flex: 1; }
.toolbox-col h4 {
  font-family: 'Fraunces', serif; font-size: 0.9rem; margin-bottom: 8px;
  padding-bottom: 4px; border-bottom: 1px solid var(--border-tertiary);
}
.toolbox-item {
  font-size: 0.78rem; padding: 5px 0; color: var(--text-secondary);
  display: flex; align-items: flex-start; gap: 6px; line-height: 1.4;
}
.toolbox-item .star { color: var(--purple-500); font-weight: 700; }
.toolbox-item .badge {
  font-size: 0.6rem; padding: 1px 6px; border-radius: 99px;
  font-weight: 600; flex-shrink: 0;
}

/* State diagram */
.state-diagram {
  display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
  align-items: center; padding: 10px;
}
.state-circle {
  width: 90px; height: 90px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; text-align: center;
  font-family: 'JetBrains Mono', monospace; font-size: 0.62rem;
  font-weight: 600; border: 2px solid var(--border-secondary);
  background: var(--bg-primary); line-height: 1.3;
}
.state-circle.active-state { border-color: var(--teal-500); background: var(--teal-50); }
.state-circle.new-state { border-color: var(--purple-500); background: var(--purple-50); border-style: dashed; }
.state-arrow { font-size: 0.72rem; color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace; }

/* Mobile */
@media (max-width: 640px) {
  .panels { flex-direction: column; }
  .toolbox-grid { flex-direction: column; }
  .card { padding: 20px 14px 16px; }
  .step-title { font-size: 1.1rem; }
  .header h1 { font-size: 1.35rem; }
  pre.code-block { font-size: 0.65rem; }
  .cd-box { min-width: 110px; max-width: 150px; }
}
</style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode" aria-label="Toggle theme">🌓</button>

<div class="container">
  <div class="header">
    <h1>The State Pattern</h1>
    <div class="subtitle">Chapter 10 · Head First Design Patterns</div>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  </div>

  <div class="card" id="card"></div>

  <div class="nav">
    <button class="nav-btn" id="prevBtn" onclick="go(-1)">← Back</button>
    <div class="dots" id="dots"></div>
    <button class="nav-btn" id="nextBtn" onclick="go(1)">Next →</button>
  </div>
  <div class="step-counter" id="counter"></div>
</div>

<script>
const steps = [
// ===== STEP 0: THE BRIEF =====
{
  pill: 'pill-gray', phase: 'THE BRIEF', title: 'Gumball Machine Goes High-Tech',
  html: `
<div class="step-desc">Mighty Gumball, Inc. wants you to build a Java controller for their gumball machines. They've given you a state diagram showing how the machine should work — four states, four actions, and transitions between them.</div>
<div class="panels">
  <div class="panel">
    <span class="panel-label code-label">💰 The Requirements</span>
    <div class="panel-body" style="font-size:0.82rem;color:var(--text-secondary)">
      <strong>States:</strong> No Quarter, Has Quarter, Gumball Sold, Sold Out<br><br>
      <strong>Actions:</strong> insertQuarter(), ejectQuarter(), turnCrank(), dispense()<br><br>
      <strong>Rules:</strong> Insert a quarter → turn the crank → get a gumball. If empty, transition to Sold Out.
    </div>
  </div>
  <div class="panel">
    <span class="panel-label diagram-label">🔄 State Diagram</span>
    <div class="panel-body">
      <div class="state-diagram">
        <div class="state-circle active-state">No<br>Quarter</div>
        <div class="state-arrow">→ insert →</div>
        <div class="state-circle">Has<br>Quarter</div>
        <div class="state-arrow">→ crank →</div>
        <div class="state-circle">Gumball<br>Sold</div>
      </div>
      <div style="text-align:center;margin-top:6px">
        <div class="state-circle" style="margin:0 auto">Sold<br>Out</div>
        <div style="font-size:0.68rem;color:var(--text-tertiary);margin-top:6px">↑ when gumballs = 0</div>
      </div>
    </div>
  </div>
</div>
<div class="callout info">📋 <strong>Your mission:</strong> Translate this state diagram into a Java class. Seems straightforward — four states, some if-else logic. Let's do it!</div>
`
},

// ===== STEP 1: FIRST ATTEMPT =====
{
  pill: 'pill-gray', phase: 'FIRST ATTEMPT', title: 'The Naive Implementation — Static Ints & Conditionals',
  html: `
<div class="step-desc">We follow the classic state machine approach: represent states as integers, write a conditional in every action method to check the current state.</div>
<div class="panels">
  <div class="panel" style="flex:1.3">
    <span class="panel-label code-label">☕ GumballMachine.java</span>
    <pre class="code-block"><span class="hi-y">final static int SOLD_OUT = 0;</span>
<span class="hi-y">final static int NO_QUARTER = 1;</span>
<span class="hi-y">final static int HAS_QUARTER = 2;</span>
<span class="hi-y">final static int SOLD = 3;</span>
<span class="hi-y">int state = SOLD_OUT;</span>
int count = 0;

public void <span class="hi-b">insertQuarter</span>() {
  <span class="hi-r">if (state == HAS_QUARTER)</span> {
    println("You can't insert another quarter");
  } <span class="hi-r">else if (state == NO_QUARTER)</span> {
    state = HAS_QUARTER;
    println("You inserted a quarter");
  } <span class="hi-r">else if (state == SOLD_OUT)</span> {
    println("Machine is sold out");
  } <span class="hi-r">else if (state == SOLD)</span> {
    println("Please wait, we're giving you a gumball");
  }
}
<span class="cm">// ... ejectQuarter(), turnCrank(), dispense()
// ALL have the same if/else-if chain!</span></pre>
  </div>
  <div class="panel">
    <span class="panel-label diagram-label">📐 Class Diagram</span>
    <div class="panel-body">
      <div class="cd-row">
        <div class="cd-box">
          <div class="cd-h">GumballMachine</div>
          <div class="cd-b">SOLD_OUT: int = 0<br>NO_QUARTER: int = 1<br>HAS_QUARTER: int = 2<br>SOLD: int = 3<br>state: int<br>count: int</div>
          <div class="cd-m">insertQuarter()<br>ejectQuarter()<br>turnCrank()<br>dispense()</div>
        </div>
      </div>
      <div style="text-align:center;font-size:0.72rem;color:var(--text-tertiary);margin-top:8px">One big class. All state logic is inside conditionals in each method.</div>
    </div>
  </div>
</div>
<div class="callout success">✅ <strong>It works!</strong> We test it — insert quarter, turn crank, get gumball. Every transition checks out. Ship it to Mighty Gumball!</div>
`
},

// ===== STEP 2: OH NO! =====
{
  pill: 'pill-red', phase: 'OH NO!', title: 'A Change Request Breaks Everything',
  html: `
<div class="step-desc">The CEO wants a <strong>"1 in 10 wins"</strong> game: 10% of the time, the customer gets two gumballs! Sounds simple… until you look at the code you'd have to change.</div>
<div class="panels">
  <div class="panel" style="flex:1">
    <span class="panel-label before-label">😱 What We'd Have to Do</span>
    <pre class="code-block"><span class="hi-r">final static int WINNER = 4;</span> <span class="cm">// add a 5th state</span>

public void insertQuarter() {
  <span class="cm">// ... existing 4 branches ...</span>
  <span class="hi-r">else if (state == WINNER) { ... }</span> <span class="cm">// ADD</span>
}
public void ejectQuarter() {
  <span class="cm">// ... existing 4 branches ...</span>
  <span class="hi-r">else if (state == WINNER) { ... }</span> <span class="cm">// ADD</span>
}
public void turnCrank() {
  <span class="cm">// ... existing 4 branches ...</span>
  <span class="hi-r">else if (state == WINNER) { ... }</span> <span class="cm">// ADD</span>
}
public void dispense() {
  <span class="cm">// ... existing 4 branches ...</span>
  <span class="hi-r">else if (state == WINNER) { ... }</span> <span class="cm">// ADD</span>
}
<span class="cm">// EVERY method touched. Every one is a bug risk.</span></pre>
  </div>

<div class="step-desc">You may have noticed: the State Pattern's class diagram is <em>identical</em> to the Strategy Pattern from Chapter 1. So what's the difference?</div>
<div class="panels">
  <div class="panel">
    <span class="panel-label" style="background:var(--teal-50);color:var(--teal-700)">🔄 State Pattern</span>
    <div class="panel-body" style="font-size:0.82rem;color:var(--text-secondary)">
      <strong>Intent:</strong> Allow behavior to change <em>automatically</em> as internal state transitions occur.<br><br>
      <strong>Who decides?</strong> The state objects themselves trigger transitions (e.g., SoldState → NoQuarterState).<br><br>
      <strong>Transitions:</strong> Well-defined, built into the scheme.<br><br>
      <strong>Analogy:</strong> A vending machine that changes its own mode as you interact with it.
    </div>
  </div>
  <div class="panel">
    <span class="panel-label" style="background:var(--coral-50);color:var(--coral-700)">🎯 Strategy Pattern</span>
    <div class="panel-body" style="font-size:0.82rem;color:var(--text-secondary)">
      <strong>Intent:</strong> Let the <em>client</em> choose which algorithm/behavior to use.<br><br>
      <strong>Who decides?</strong> The client configures the context with a strategy object (e.g., duck.setFlyBehavior()).<br><br>
      <strong>Transitions:</strong> Not built in — the client explicitly swaps strategies.<br><br>
      <strong>Analogy:</strong> Choosing a sort algorithm at runtime based on data size.
    </div>
  </div>
</div>
<div class="callout warning">⚖️ <strong>Key insight:</strong> Both use composition and delegation. With State, the context's behavior changes <em>implicitly</em> as state transitions fire. With Strategy, the client <em>explicitly</em> picks the behavior. Same structure, very different intent.</div>
`

      <strong>Option B: In the GumballMachine</strong><br>
      ✅ All transitions in one place<br>
      ❌ Machine must know about all states, harder to add new ones<br><br>
      <span style="color:var(--text-primary);font-weight:600">We chose Option A.</span> When adding a new state, you may need to modify existing state classes that transition to it — that's the trade-off.
    </div>
  </div>
  <div class="panel">
    <span class="panel-label" style="background:var(--bg-warning);color:var(--text-warning)">🔧 Cleanup opportunities</span>
    <div class="panel-body" style="font-size:0.8rem;color:var(--text-secondary)">
      <strong>Duplicate code:</strong> SoldState and WinnerState share most error messages. Solution: make State an abstract class with default "error" implementations.<br><br>
      <strong>dispense() always called:</strong> turnCrank() always calls dispense(), even when no quarter is in. We could have turnCrank() return a boolean, or throw an exception.<br><br>
      <strong>Shared instances:</strong> If you have many GumballMachines, consider making state instances static (but watch out for shared machine references).
    </div>
  </div>
</div>
<div class="callout warning">⚖️ <strong>No design is perfect.</strong> The State Pattern gives us great extensibility and maintainability, but we trade off some coupling between state classes. Choose based on what changes most in your system.</div>
`

let current = 0;

function render() {
  const s = steps[current];
  const card = document.getElementById('card');
  card.innerHTML = `
    <div class="step-label"><span class="pill ${s.pill}">${s.phase}</span></div>
    <div class="step-title">${s.title}</div>
    ${s.html}
  `;
  // force reflow for animation
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';

  document.getElementById('progress').style.width = ((current + 1) / steps.length * 100) + '%';
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === steps.length - 1;
  document.getElementById('counter').textContent = (current + 1) + ' / ' + steps.length;

  const dots = document.getElementById('dots');
  dots.innerHTML = '';
  for (let i = 0; i < steps.length; i++) {
    const d = document.createElement('button');
    d.className = 'dot' + (i === current ? ' active' : '');
    d.onclick = () => { current = i; render(); };
    d.title = 'Step ' + (i + 1);
    d.setAttribute('aria-label', 'Go to step ' + (i + 1));
    dots.appendChild(d);
  }
}

function go(dir) {
  const next = current + dir;
  if (next >= 0 && next < steps.length) { current = next; render(); }
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(1);
  if (e.key === 'ArrowLeft') go(-1);
});

function toggleTheme() {
  const html = document.documentElement;
  html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
}

render();
</script>
