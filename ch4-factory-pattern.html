  --coral-400: #f08a66;
  --coral-500: #f4a080;
  --coral-600: #f6b49a;

* { margin:0; padding:0; box-sizing:border-box; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg-tertiary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
code, pre, .mono {
  font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
}
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 16px 16px 24px;
}
/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0 12px;
}
.header h1 {
  font-family: 'Fraunces', 'Georgia', serif;
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.02em;
}
.header h1 span { color: var(--coral-500); }
.theme-toggle {
  background: var(--bg-secondary);
  border: 1px solid var(--border-secondary);
  border-radius: 20px;
  padding: 6px 12px;
  font-size: 0.78rem;
  cursor: pointer;
  color: var(--text-secondary);
  transition: all 0.2s;
}
.theme-toggle:hover { background: var(--bg-primary); }
/* Progress bar */
.progress-bar {
  height: 3px;
  background: var(--progress-bg);
  border-radius: 2px;
  margin-bottom: 14px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--progress-fill);
  border-radius: 2px;
  transition: width 0.4s ease;
}
/* Main card */
.card {
  background: var(--bg-primary);
  border: 1px solid var(--border-secondary);
  border-radius: 12px;
  box-shadow: var(--card-shadow);
  overflow: hidden;
}
/* Step header */
.step-header {
  padding: 20px 24px 0;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.step-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--text-tertiary);
  background: var(--bg-secondary);
  border-radius: 4px;
  padding: 2px 6px;
  white-space: nowrap;
  margin-top: 3px;
}
.step-title {
  font-family: 'Fraunces', 'Georgia', serif;
  font-size: 1.25rem;
  font-weight: 600;
  line-height: 1.35;
  letter-spacing: -0.01em;
}
/* Phase pill */
.pill {
  display: inline-block;
  font-size: 0.68rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.pill-gray { background: var(--pill-gray-bg); color: var(--pill-gray-text); }
.pill-red { background: var(--pill-red-bg); color: var(--pill-red-text); }
.pill-yellow { background: var(--pill-yellow-bg); color: var(--pill-yellow-text); }
.pill-blue { background: var(--pill-blue-bg); color: var(--pill-blue-text); }
.pill-green { background: var(--pill-green-bg); color: var(--pill-green-text); }
.pill-purple { background: var(--pill-purple-bg); color: var(--pill-purple-text); }
/* Content area */
.step-body {
  padding: 16px 24px 20px;
}
.step-body p {
  color: var(--text-secondary);
  font-size: 0.92rem;
  margin-bottom: 12px;
}
.step-body p:last-child { margin-bottom: 0; }
/* Panels */
.panels {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 14px 0;
}
.panel {
  background: var(--bg-secondary);
  border: 1px solid var(--border-tertiary);
  border-radius: 8px;
  overflow: hidden;
}
.panel-label {
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 8px 12px 4px;
  color: var(--text-tertiary);
}
.panel-label.before { color: var(--text-danger); }
.panel-label.after { color: var(--text-success); }
.full-panel {
  background: var(--bg-secondary);
  border: 1px solid var(--border-tertiary);
  border-radius: 8px;
  overflow: hidden;
  margin: 14px 0;
}
/* Code blocks */
pre.code {
  font-size: 0.76rem;
  line-height: 1.65;
  padding: 10px 12px;
  overflow-x: auto;
  white-space: pre;
  color: var(--text-primary);

}
.hi-r { background: var(--bg-danger); border-radius: 3px; padding: 1px 2px; }
.hi-g { background: var(--bg-success); border-radius: 3px; padding: 1px 2px; }
.hi-y { background: var(--bg-warning); border-radius: 3px; padding: 1px 2px; }
.hi-b { background: var(--bg-info); border-radius: 3px; padding: 1px 2px; }
.cm { color: var(--text-tertiary); }
/* Class diagrams */
.cd-row {

  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  margin: 8px 0;
}
.cd-arr {

  font-family: 'JetBrains Mono', monospace;

  letter-spacing: 0.04em;
}
.cd-box {
  border: 1.5px solid var(--border-primary);
  border-radius: 6px;
  background: var(--bg-primary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  min-width: 120px;
  max-width: 200px;
  overflow: hidden;
}
.cd-box .cd-h {
  font-weight: 600;
  padding: 6px 10px;
  border-bottom: 1px solid var(--border-tertiary);
  font-size: 0.74rem;

}
.cd-box .cd-b, .cd-box .cd-m {
  padding: 4px 10px;

}
.cd-box .cd-b { border-bottom: 1px solid var(--border-tertiary); }
.cd-box.bad { background: var(--bg-danger); border-color: var(--text-danger); }
.cd-box.bad .cd-h { color: var(--text-danger); }
.cd-box.dup { background: var(--bg-warning); border-color: var(--text-warning); }
.cd-box.dup .cd-h { color: var(--text-warning); }
.cd-box.iface { background: var(--bg-purple); border: 1.5px dashed var(--purple-400); }
.cd-box.iface .cd-h { color: var(--purple-600); }
.cd-box.ctx { background: var(--bg-teal); border-color: var(--teal-400); }
.cd-box.ctx .cd-h { color: var(--teal-600); }
.cd-box.obs { background: var(--bg-coral); border-color: var(--coral-400); }
.cd-box.obs .cd-h { color: var(--coral-600); }

/* Principle box */
.principle-box {

.callout.success { border-left-color: var(--text-success); background: var(--bg-success); }

.callout.purple { border-left-color: var(--purple-500); background: var(--bg-purple); }
.callout strong { color: var(--text-primary); }
/* Navigation */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px 18px;
  gap: 8px;
}
.nav-btn {
  font-family: 'DM Sans', sans-serif;

  font-weight: 600;
  padding: 7px 18px;
  border-radius: 8px;
  border: 1px solid var(--border-primary);
  background: var(--bg-primary);
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.15s;

}
.nav-btn:hover { background: var(--bg-secondary); }
.nav-btn:disabled { opacity: 0.35; cursor: default; }
.nav-btn.primary {
  background: var(--teal-500);
  color: #fff;
  border-color: var(--teal-600);
}
.nav-btn.primary:hover { background: var(--teal-600); }
.nav-btn.primary:disabled { background: var(--teal-500); opacity:0.4; }
.dots {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;

}
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;

}
.dot:hover { background: var(--text-tertiary); }
.dot.active {
  background: var(--teal-500);

/* Animation */
.step-content {

@keyframes fadeSlide {

/* Toolbox grid */
.toolbox-grid {
  display: grid;

@media (max-width: 640px) {

/* Comparison table */
.cmp-table {
  width: 100%;
  border-collapse: collapse;

}
.cmp-table th {

  border-bottom: 2px solid var(--border-primary);

<script>
const STEPS = [
// ============================================================
// STEP 0 — THE BRIEF
// ============================================================
{
pill: { text: 'The Brief', cls: 'pill-gray' },
num: '01',
title: 'Welcome to Objectville Pizza',
body: `<p>You own a pizza store. Your <code>orderPizza()</code> method creates a pizza, prepares it, bakes it, cuts it, and boxes it. Life is simple — for now.</p>
<div class="full-panel">
<div class="panel-label">Starting Code</div>
<pre class="code">Pizza orderPizza() {
  Pizza pizza = <span class="hi-g">new CheesePizza()</span>;

  pizza.prepare();
  pizza.bake();
  pizza.cut();
  pizza.box();
  return pizza;
}</pre>
</div>
<p>But customers want choices — cheese, pepperoni, clam, veggie... so you need to parameterize the method. Let's see how that plays out.</p>
<div class="full-panel">
<div class="panel-label">System Overview</div>
<div style="padding:12px">
<div class="cd-row">
  <div class="cd-box ctx" style="min-width:160px">
    <div class="cd-h">PizzaStore</div>
    <div class="cd-m">orderPizza(type)</div>
  </div>
</div>
<div class="cd-arr">creates ▼</div>
<div class="cd-row">
  <div class="cd-box"><div class="cd-h">CheesePizza</div></div>
  <div class="cd-box"><div class="cd-h">GreekPizza</div></div>
  <div class="cd-box"><div class="cd-h">PepperoniPizza</div></div>
</div>
</div>
</div>`,
callout: { text: '<strong>The setup:</strong> A single store, a handful of pizza types, and a method that picks the right one with <code>new</code>.', cls: '' }
},

// ============================================================
// STEP 1 — FIRST ATTEMPT
// ============================================================
{
pill: { text: 'First Attempt', cls: 'pill-gray' },
num: '02',
title: 'The Naive Implementation',
body: `<p>You add a <code>type</code> parameter to <code>orderPizza()</code> and use an <code>if/else</code> chain to instantiate the right concrete class. Simple, direct, and it works!</p>
<div class="full-panel">
<div class="panel-label">orderPizza v1</div>
<pre class="code">Pizza orderPizza(String type) {
  Pizza pizza;

  <span class="hi-y">if (type.equals("cheese")) {
    pizza = new CheesePizza();
  } else if (type.equals("greek")) {
    pizza = new GreekPizza();
  } else if (type.equals("pepperoni")) {
    pizza = new PepperoniPizza();
  }</span>

  pizza.prepare();
  pizza.bake();
  pizza.cut();
  pizza.box();
  return pizza;
}</pre>
</div>
<p>Customers are happy, pizzas are rolling out. But then the boss says: "Add Clam and Veggie. And drop Greek — nobody orders it." Uh-oh...</p>`,
callout: { text: '<strong>Feels good!</strong> We\'ve got working code. But every menu change means opening up this method and surgery on the <code>if/else</code> chain.', cls: '' }
},

// ============================================================
// STEP 2 — OH NO! DIAGNOSIS
// ============================================================
{
pill: { text: 'Oh No!', cls: 'pill-red' },
num: '03',
title: 'The Code That Won\'t Stop Changing',
body: `<p>Every time you add or remove a pizza type, you have to <em>modify</em> <code>orderPizza()</code>. But the rest of the method — prepare, bake, cut, box — never changes! Let's diagnose this with principles we already know.</p>
<div class="full-panel">
<div class="panel-label">Violations Annotated</div>
<pre class="code">Pizza orderPizza(String type) {
  Pizza pizza;
  <span class="hi-r">// THIS PART CHANGES with every menu update</span>
  <span class="hi-r">if (type.equals("cheese")) {
    pizza = new CheesePizza();
  } else if (type.equals("clam")) {       // NEW!
    pizza = new ClamPizza();               // NEW!
  } else if (type.equals("veggie")) {      // NEW!
    pizza = new VeggiePizza();             // NEW!
  } else if (type.equals("pepperoni")) {
    pizza = new PepperoniPizza();
  }</span>
  <span class="hi-g">// THIS PART is stable — same for every pizza</span>
  <span class="hi-g">pizza.prepare();
  pizza.bake();
  pizza.cut();
  pizza.box();</span>
  return pizza;
}</pre>
</div>
<p><strong>Principle check:</strong></p>
<p>❌ <strong>Encapsulate what varies</strong> — The creation code varies but is tangled with stable code.</p>
<p>❌ <strong>Open-Closed Principle</strong> — We can't add pizzas without modifying <code>orderPizza()</code>.</p>
<p>❌ <strong>Program to interfaces</strong> — We're coding directly to concrete pizza classes via <code>new</code>.</p>`,
callout: { text: '<strong>Diagnosis:</strong> Three principles violated in one method. The root cause? Object creation is mixed in with business logic. Time to separate them.', cls: 'danger' }
},

// ============================================================
// STEP 3 — APPLY PRINCIPLE: ENCAPSULATE WHAT VARIES
// ============================================================
{
pill: { text: 'Design Principle', cls: 'pill-blue' },
num: '04',
title: 'Apply: Encapsulate What Varies',
body: `
<div class="principle-box">

  <div class="text">"Identify the aspects of your application that vary and separate them from what stays the same."</div>
</div>
<p>The creation code varies. The order process is stable. Let's pull the creation code into its own class — a <strong>Simple Factory</strong>.</p>
<div class="panels">
  <div class="panel">
    <div class="panel-label before">Before — Mixed Concerns</div>
    <pre class="code"><span class="hi-r">// Creation + ordering in one class</span>
Pizza orderPizza(String type) {
  Pizza pizza;
  <span class="hi-r">if (type.equals("cheese"))
    pizza = new CheesePizza();
  else if (type.equals("clam"))
    pizza = new ClamPizza();
  // ... more types ...</span>
  pizza.prepare();
  pizza.bake();
  pizza.cut();
  pizza.box();
  return pizza;
}</pre>
  </div>
  <div class="panel">
    <div class="panel-label after">After — Extracted Factory</div>
    <pre class="code"><span class="hi-g">class SimplePizzaFactory {
 Pizza createPizza(String type) {
  if (type.equals("cheese"))
    return new CheesePizza();
  else if (type.equals("clam"))
    return new ClamPizza();
  // ... types ...
 }
}</span>

<span class="cm">// PizzaStore is now clean:</span>
pizza = <span class="hi-g">factory.createPizza(type)</span>;
pizza.prepare();
pizza.bake();
pizza.cut();
pizza.box();</pre>
  </div>
</div>
<div class="full-panel">
<div class="panel-label">Class Diagram — Simple Factory</div>

body: `<p>Your pizza empire is expanding! New York wants thin crust with marinara. Chicago wants deep-dish with plum tomato sauce. You could make regional factories...</p>
<div class="full-panel">
<div class="panel-label">Multiple Factories?</div>
<pre class="code">NYPizzaFactory nyFactory = new NYPizzaFactory();
PizzaStore nyStore = new PizzaStore(nyFactory);

ChicagoPizzaFactory chiFactory = new ChicagoPizzaFactory();
PizzaStore chiStore = new PizzaStore(chiFactory);

<span class="hi-r">// Problem: Nothing stops a franchise from using</span>
<span class="hi-r">// the factory BUT skipping prepare(), using their</span>
<span class="hi-r">// own bake process, or boxing differently!</span>
<span class="hi-r">// We've lost control of the ORDER PROCESS.</span></pre>
</div>
<p>With Simple Factory, the franchisees get a factory but can do <em>whatever they want</em> with it. The quality process (<code>prepare → bake → cut → box</code>) is no longer guaranteed. We want to give them freedom to choose <strong>what</strong> kind of pizza to make, but lock in <strong>how</strong> the order is processed.</p>
<p>We need a <em>framework</em> that ties creation and processing together, while still letting each region customize its pizzas.</p>`,

title: 'Apply: Program to Interfaces, Not Implementations',
body: `
<div class="principle-box">
  <div class="label">OO Principle</div>
  <div class="text">"Program to an interface, not an implementation."</div>
</div>
<p>Instead of composing PizzaStore with a separate factory object, make <code>PizzaStore</code> abstract and define an <em>abstract method</em> <code>createPizza()</code>. Subclasses decide what to create, but the superclass controls the process.</p>
<div class="panels">
  <div class="panel">
    <div class="panel-label before">Before — Separate Factory</div>
    <pre class="code">class PizzaStore {
  <span class="hi-r">SimplePizzaFactory factory;</span>

  Pizza orderPizza(String type) {
    pizza = <span class="hi-r">factory.createPizza(type)</span>;
    pizza.prepare();
    pizza.bake();
    pizza.cut();
    pizza.box();
    return pizza;
  }
}

<span class="cm">// Franchise can bypass orderPizza
// and use factory directly!</span></pre>
  </div>
  <div class="panel">
    <div class="panel-label after">After — Abstract Creator</div>
    <pre class="code"><span class="hi-g">abstract</span> class PizzaStore {

  Pizza orderPizza(String type) {
    pizza = <span class="hi-g">createPizza(type)</span>;
    pizza.prepare();
    pizza.bake();
    pizza.cut();
    pizza.box();
    return pizza;
  }

  <span class="hi-g">abstract Pizza createPizza(String type);</span>
}

<span class="cm">// Subclasses MUST implement createPizza
// but CANNOT change orderPizza!</span></pre>
  </div>
</div>
<p>Now <code>orderPizza()</code> calls <code>createPizza()</code> — but it has no idea which concrete class gets instantiated. That decision is deferred to the subclass.</p>`,
callout: { text: '<strong>Key move:</strong> By making the creator abstract, we tie creation into the framework. The superclass controls the process; the subclass controls which product gets made.', cls: 'info' }
},

<div class="full-panel">
<div style="padding:12px">
<table class="cmp-table">
<tr><th></th><th>Factory Method</th><th>Abstract Factory</th></tr>
<tr><td><strong>Creates</strong></td><td>One product</td><td>Family of products</td></tr>
<tr><td><strong>Mechanism</strong></td><td>Inheritance — subclass overrides factory method</td><td>Composition — factory object passed in</td></tr>
<tr><td><strong>Intent</strong></td><td>Let subclasses decide which class to instantiate</td><td>Create families of related objects without specifying concrete classes</td></tr>
<tr><td><strong>Adding products</strong></td><td>New subclass per product variation</td><td>New factory per product family</td></tr>
<tr><td><strong>Risk</strong></td><td>Subclass proliferation</td><td>Adding a new product type means changing the interface + all factories</td></tr>
</table>
</div>
</div>
<p>In our pizza example, they work <em>together</em>:</p>

body: `<p>The DIP gives us three guidelines to follow. These are ideals, not absolutes — but keeping them in mind helps you spot bad coupling early:</p>
<div class="full-panel">
<div style="padding:14px">
<p style="margin-bottom:10px"><span class="hi-r" style="padding:2px 6px">1</span> &nbsp;<strong>No variable should hold a reference to a concrete class.</strong><br><span style="color:var(--text-tertiary); font-size:0.85rem">If you use <code>new</code>, you're holding a concrete reference. Use a factory instead.</span></p>
<p style="margin-bottom:10px"><span class="hi-r" style="padding:2px 6px">2</span> &nbsp;<strong>No class should derive from a concrete class.</strong><br><span style="color:var(--text-tertiary); font-size:0.85rem">Derive from an abstraction — an interface or abstract class.</span></p>
<p style="margin-bottom:0"><span class="hi-r" style="padding:2px 6px">3</span> &nbsp;<strong>No method should override an implemented method of a base class.</strong><br><span style="color:var(--text-tertiary); font-size:0.85rem">If you override, the base wasn't truly an abstraction.</span></p>
</div>
</div>
<p>These sound impossible to follow perfectly, and they are! Every Java program violates them. But like speed limits, they're there to keep you thinking. If you instantiate <code>String</code> — fine, it'll never change. If you instantiate <code>NYStyleCheesePizza</code> directly in your business logic — that's where the factory should step in.</p>`,
callout: { text: '<strong>DIP is a compass, not a rulebook.</strong> It tells you which direction "better design" lies — toward abstractions and away from concrete classes.', cls: 'info' }
},

let current = 0;

function render() {
  const s = STEPS[current];
  const ct = document.getElementById('step-container');
  ct.innerHTML = `
    <div class="step-content" key="${current}">
      <div class="step-header">
        <span class="step-num">${s.num}</span>
        <div>
          <span class="pill ${s.pill.cls}">${s.pill.text}</span>
          <div class="step-title">${s.title}</div>
        </div>
      </div>
      <div class="step-body">${s.body}</div>
      ${s.callout ? `<div class="callout ${s.callout.cls}">${s.callout.text}</div>` : ''}
    </div>
  `;
  // progress
  document.getElementById('progress').style.width = ((current + 1) / STEPS.length * 100) + '%';
  // dots
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = STEPS.map((_, i) =>
    `<button class="dot${i === current ? ' active' : ''}" onclick="goTo(${i})" aria-label="Step ${i+1}"></button>`
  ).join('');
  // buttons
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === STEPS.length - 1;
  document.getElementById('nextBtn').textContent = current === STEPS.length - 1 ? 'Done ✓' : 'Next →';
}

function go(dir) {
  const next = current + dir;
  if (next >= 0 && next < STEPS.length) { current = next; render(); window.scrollTo({top:0,behavior:'smooth'}); }
}
function goTo(i) {
  current = i; render(); window.scrollTo({top:0,behavior:'smooth'});
}

function toggleTheme() {
  const html = document.documentElement;
  html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(1);
  if (e.key === 'ArrowLeft') go(-1);
});

render();
</script>
