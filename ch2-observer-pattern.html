<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter 2: The Observer Pattern — A Principle-Driven Journey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f5f4f0;
  --bg-tertiary: #eceae4;
  --bg-info: #e6f1fb;
  --bg-danger: #fcebeb;
  --bg-success: #eaf3de;
  --bg-warning: #faeeda;
  --text-primary: #1a1a18;
  --text-secondary: #6b6a65;
  --text-tertiary: #9c9a92;
  --text-info: #0c447c;
  --text-danger: #791f1f;
  --text-success: #27500a;
  --text-warning: #633806;
  --border-tertiary: rgba(0,0,0,0.08);
  --border-secondary: rgba(0,0,0,0.15);
  --purple-50: #EEEDFE; --purple-100: #DDDAFE; --purple-600: #534AB7; --purple-800: #3C3489;
  --teal-50: #E1F5EE; --teal-100: #C3EBD9; --teal-600: #0F6E56; --teal-800: #085041;
  --coral-50: #FAECE7; --coral-100: #F5D9D0; --coral-600: #993C1D; --coral-800: #712B13;
  --progress-bg: #ddd8d0;
  --progress-fill: #534AB7;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.07);
  --code-bg: #f8f7f4;
}
[data-theme="dark"] {
  --bg-primary: #1e1e20;
  --bg-secondary: #28282c;
  --bg-tertiary: #141416;
  --bg-info: #172436;
  --bg-danger: #2c1616;
  --bg-success: #1a2612;
  --bg-warning: #2a2010;
  --text-primary: #e4e3de;
  --text-secondary: #9c9a92;
  --text-tertiary: #6b6a65;
  --text-info: #7fb3e0;
  --text-danger: #e89a9a;
  --text-success: #a4c97a;
  --text-warning: #d4a84a;
  --border-tertiary: rgba(255,255,255,0.08);
  --border-secondary: rgba(255,255,255,0.15);
  --purple-50: #252340; --purple-100: #302d55; --purple-600: #9b93ef; --purple-800: #b8b1ff;
  --teal-50: #14292a; --teal-100: #1b3836; --teal-600: #4dcaaa; --teal-800: #7ee8c9;
  --coral-50: #2c1f1a; --coral-100: #3d2a22; --coral-600: #e8855c; --coral-800: #f0a888;
  --progress-bg: #333338;
  --progress-fill: #9b93ef;
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
  --code-bg: #1a1a1e;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
  background: var(--bg-tertiary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.outer { max-width: 900px; margin: 0 auto; padding: 16px 12px 32px; }
.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px; padding: 0 4px;
}
.header-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.02em; }
.theme-toggle {
  background: var(--bg-secondary); border: 1px solid var(--border-tertiary);
  border-radius: 20px; padding: 5px 12px; cursor: pointer;
  font-family: inherit; font-size: 12px; color: var(--text-secondary); transition: all 0.2s;
}
.theme-toggle:hover { border-color: var(--border-secondary); }
.progress-track { height: 3px; background: var(--progress-bg); border-radius: 3px; margin-bottom: 12px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--progress-fill); border-radius: 3px; transition: width 0.4s ease; }
.card {
  background: var(--bg-primary); border: 1px solid var(--border-tertiary);
  border-radius: 14px; box-shadow: var(--shadow); overflow: hidden;
  min-height: 460px; display: flex; flex-direction: column;
}
.step-header { padding: 24px 28px 0; }
.step-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 11px; border-radius: 20px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase;
}
.pill-try { background: var(--bg-secondary); color: var(--text-secondary); }
.pill-problem { background: var(--bg-danger); color: var(--text-danger); }
.pill-fix { background: var(--bg-warning); color: var(--text-warning); }
.pill-principle { background: var(--bg-info); color: var(--text-info); }
.pill-solution { background: var(--bg-success); color: var(--text-success); }
.pill-pattern { background: var(--purple-50); color: var(--purple-600); }
.step-num { font-size: 11px; color: var(--text-tertiary); font-weight: 500; }
.step-title { font-size: 20px; font-weight: 700; line-height: 1.3; margin-bottom: 6px; letter-spacing: -0.01em; }
.step-subtitle { font-size: 14px; color: var(--text-secondary); line-height: 1.55; margin-bottom: 16px; }
.step-body { padding: 0 28px 0; flex: 1; }
.principle-box {
  border-left: 3px solid var(--text-info); background: var(--bg-info); color: var(--text-info);
  padding: 12px 16px; border-radius: 0 8px 8px 0; margin-bottom: 16px;
  font-size: 13.5px; font-weight: 500; line-height: 1.5;
}
.principle-box .plabel {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
  font-weight: 700; margin-bottom: 3px; opacity: 0.7;
}
.panels { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 700px) {
  .panels { grid-template-columns: 1fr; }
  .outer { padding: 10px 6px 24px; }
  .step-header, .step-body, .callout { padding-left: 16px; padding-right: 16px; }
  .step-title { font-size: 17px; }
  .ba-grid { grid-template-columns: 1fr !important; }
}
.panel { border: 1px solid var(--border-tertiary); border-radius: 10px; overflow: hidden; }
.panel-header {
  background: var(--bg-secondary); padding: 6px 12px;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-tertiary);
  border-bottom: 1px solid var(--border-tertiary);
}
.panel-code {
  padding: 14px; font-family: 'JetBrains Mono', 'Fira Code', monospace;
  font-size: 11.5px; line-height: 1.65; white-space: pre; overflow-x: auto;
  background: var(--code-bg); color: var(--text-primary); tab-size: 2;
}
.panel-diagram { padding: 14px 12px; background: var(--bg-primary); }
.full-panel { grid-column: 1 / -1; }

.hi-r { background: var(--bg-danger); padding: 1px 3px; border-radius: 3px; }
.hi-g { background: var(--bg-success); padding: 1px 3px; border-radius: 3px; }
.hi-y { background: var(--bg-warning); padding: 1px 3px; border-radius: 3px; }
.hi-b { background: var(--bg-info); padding: 1px 3px; border-radius: 3px; }
.cm { color: var(--text-tertiary); }

.ba-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.cd-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 6px; }
.cd-box {
  border: 1.5px solid var(--border-secondary); border-radius: 8px;
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  min-width: 110px; max-width: 200px; overflow: hidden; background: var(--bg-primary);
}
.cd-h {
  padding: 5px 10px; font-weight: 700; font-size: 11px;
  border-bottom: 1px solid var(--border-tertiary); text-align: center;
}
.cd-b { padding: 4px 10px; font-size: 10px; border-bottom: 1px solid var(--border-tertiary); }
.cd-m { padding: 5px 10px; font-size: 10px; line-height: 1.5; }
.cd-box.bad { border-color: var(--text-danger); background: var(--bg-danger); }
.cd-box.bad .cd-h { color: var(--text-danger); }
.cd-box.dup { border-color: var(--text-warning); background: var(--bg-warning); }
.cd-box.dup .cd-h { color: var(--text-warning); }
.cd-box.iface { border-style: dashed; border-color: var(--purple-600); background: var(--purple-50); }
.cd-box.iface .cd-h { color: var(--purple-600); }
.cd-box.ctx { border-color: var(--teal-600); background: var(--teal-50); }
.cd-box.ctx .cd-h { color: var(--teal-600); }
.cd-box.obs { border-color: var(--coral-600); background: var(--coral-50); }
.cd-box.obs .cd-h { color: var(--coral-600); }
.cd-box.good { border-color: var(--text-success); background: var(--bg-success); }
.cd-box.good .cd-h { color: var(--text-success); }
.cd-arr { text-align: center; font-size: 11px; color: var(--text-tertiary); padding: 2px 0; line-height: 1.3; }
.cd-label {
  font-family: 'DM Sans', sans-serif; font-size: 10px; color: var(--text-tertiary);
  text-align: center; margin-bottom: 4px; font-weight: 500;
  letter-spacing: 0.04em; text-transform: uppercase;
}
.cd-note {
  font-family: 'DM Sans', sans-serif; font-size: 10.5px; color: var(--text-secondary);
  text-align: center; margin-top: 8px; font-style: italic; line-height: 1.4;
}

.callout {
  margin: 14px 28px 18px; padding: 10px 14px;
  border-left: 3px solid var(--text-secondary); font-size: 13px;
  line-height: 1.55; color: var(--text-secondary);
}
.callout-problem { border-color: var(--text-danger); background: var(--bg-danger); color: var(--text-danger); }
.callout-warning { border-color: var(--text-warning); background: var(--bg-warning); color: var(--text-warning); }
.callout-principle { border-color: var(--text-info); background: var(--bg-info); color: var(--text-info); }
.callout-success { border-color: var(--text-success); background: var(--bg-success); color: var(--text-success); }
.callout-pattern { border-color: var(--purple-600); background: var(--purple-50); color: var(--purple-600); }

.nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px 18px; border-top: 1px solid var(--border-tertiary); margin-top: auto;
}
.nav-btn {
  background: var(--bg-secondary); border: 1px solid var(--border-tertiary);
  border-radius: 8px; padding: 8px 18px; cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 600;
  color: var(--text-primary); transition: all 0.15s;
}
.nav-btn:hover:not(:disabled) { background: var(--bg-tertiary); border-color: var(--border-secondary); }
.nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.nav-btn.primary { background: var(--purple-600); color: #fff; border-color: var(--purple-600); }
.nav-btn.primary:hover:not(:disabled) { background: var(--purple-800); }
.dots { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; justify-content: center; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--progress-bg); transition: all 0.25s; cursor: pointer; }
.dot.active { background: var(--progress-fill); transform: scale(1.35); }
.dot.visited { background: var(--text-tertiary); }

@keyframes fadeSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.step-content { animation: fadeSlide 0.35s ease; }

.runtime-box {
  background: var(--bg-secondary); border: 1px solid var(--border-tertiary);
  border-radius: 8px; padding: 12px 16px; margin-top: 10px;
  font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.7;
}
.runtime-box .rl { color: var(--text-tertiary); }
.runtime-box .rv { color: var(--teal-600); }
.runtime-box .rw { color: var(--text-warning); }
</style>
</head>
<body>
<div class="outer">
  <div class="header">
    <span class="header-title">Ch 2 &middot; The Observer Pattern</span>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">&#9681; Theme</button>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="card">
    <div id="stepContainer"></div>
    <div class="nav">
      <button class="nav-btn" id="prevBtn" onclick="go(-1)">&#8592; Back</button>
      <div class="dots" id="dotsContainer"></div>
      <button class="nav-btn primary" id="nextBtn" onclick="go(1)">Next &#8594;</button>
    </div>
  </div>
</div>
<script>
const S=[{pill:'try',pillLabel:'The Brief',title:'Weather-O-Rama wants display panels',subtitle:'You just won the contract. The WeatherData object tracks temperature, humidity, and pressure. Your job: implement measurementsChanged() so it updates three displays whenever new data arrives. Oh \u2014 and it must be expandable for future third-party displays.',panels:[{type:'code',label:'WeatherData.java (provided to you)',full:false,code:'<span class="cm">// Provided by Weather-O-Rama, Inc.</span>\npublic class <span class="hi-b">WeatherData</span> {\n\n  <span class="hi-g">float getTemperature()</span>\n  <span class="hi-g">float getHumidity()</span>\n  <span class="hi-g">float getPressure()</span>\n\n  <span class="cm">/* Called whenever the weather</span>\n  <span class="cm"> * measurements have been updated */</span>\n  public void <span class="hi-y">measurementsChanged()</span> {\n    <span class="cm">// YOUR CODE GOES HERE</span>\n  }\n}'},{type:'diagram',label:'System overview',full:false,html:'<div class="cd-label">What they give us vs. what we build</div><div class="cd-row"><div class="cd-box ctx" style="min-width:155px"><div class="cd-h">WeatherData</div><div class="cd-m">getTemperature()<br>getHumidity()<br>getPressure()<br>measurementsChanged()</div></div></div><div class="cd-arr">\u2500\u2500 updates \u2500\u2500\u25b7</div><div class="cd-row"><div class="cd-box"><div class="cd-h">Current Conds</div><div class="cd-m">Temp: 72\u00b0F<br>Humidity: 60%</div></div><div class="cd-box"><div class="cd-h">Statistics</div><div class="cd-m">Avg / Min / Max</div></div><div class="cd-box"><div class="cd-h">Forecast</div><div class="cd-m">Improving!</div></div></div><div class="cd-note">+ future third-party displays\u2026</div>'}],callout:'success',calloutText:'Seems simple enough \u2014 we have getter methods, a hook method, and three displays. Let\u2019s just wire it up and ship it!'},{pill:'try',pillLabel:'First Attempt',title:'The \u201cjust get it working\u201d approach',subtitle:'We grab the latest measurements and call update() on each display directly. It compiles. It runs. All three displays show data. Job done?',panels:[{type:'code',label:'measurementsChanged() \u2014 first try',full:false,code:'public void measurementsChanged() {\n\n  <span class="cm">// Grab the latest values</span>\n  float temp = getTemperature();\n  float humidity = getHumidity();\n  float pressure = getPressure();\n\n  <span class="cm">// Update every display</span>\n  <span class="hi-r">currentConditionsDisplay</span>.update(\n      temp, humidity, pressure);\n  <span class="hi-r">statisticsDisplay</span>.update(\n      temp, humidity, pressure);\n  <span class="hi-r">forecastDisplay</span>.update(\n      temp, humidity, pressure);\n}'},{type:'diagram',label:'What we built',full:false,html:'<div class="cd-label">Architecture right now</div><div class="cd-row"><div class="cd-box bad" style="min-width:170px"><div class="cd-h">WeatherData</div><div class="cd-m">measurementsChanged()<br><span style="color:var(--text-danger)">\u2192 currentCond.update()</span><br><span style="color:var(--text-danger)">\u2192 statistics.update()</span><br><span style="color:var(--text-danger)">\u2192 forecast.update()</span></div></div></div><div class="cd-arr">hard-coded concrete references \u2193</div><div class="cd-row"><div class="cd-box bad"><div class="cd-h">CurrentCond</div></div><div class="cd-box bad"><div class="cd-h">Statistics</div></div><div class="cd-box bad"><div class="cd-h">Forecast</div></div></div><div class="cd-note">Every arrow is a direct dependency on a concrete class.</div>'}],callout:'warning',calloutText:'It works\u2026 but wait. Remember the OO principles from Chapter 1? Let\u2019s hold this code up against each one and see how it scores.'},{pill:'problem',pillLabel:'Oh no!',title:'Let\u2019s diagnose with our Chapter 1 principles',subtitle:'We learned three OO design principles last chapter. Let\u2019s use them as a checklist against our naive code. Spoiler: we\u2019re failing every single one.',panels:[{type:'code',label:'Our code, annotated with violations',full:true,code:'public void measurementsChanged() {\n  float temp = getTemperature();\n  float humidity = getHumidity();\n  float pressure = getPressure();\n\n  <span class="hi-r">currentConditionsDisplay.update(temp, humidity, pressure);</span>\n  <span class="hi-r">statisticsDisplay.update(temp, humidity, pressure);</span>\n  <span class="hi-r">forecastDisplay.update(temp, humidity, pressure);</span>\n}\n\n<span class="cm">// \u274c PRINCIPLE 1: \u201cEncapsulate what varies\u201d</span>\n<span class="cm">//    The list of displays WILL change (new ones, removed ones).</span>\n<span class="cm">//    But it\u2019s hard-coded right here. NOT encapsulated.</span>\n\n<span class="cm">// \u274c PRINCIPLE 2: \u201cProgram to interfaces, not implementations\u201d</span>\n<span class="cm">//    We\u2019re calling methods on CONCRETE objects:</span>\n<span class="cm">//    currentConditionsDisplay, statisticsDisplay, forecastDisplay.</span>\n<span class="cm">//    Not a single interface in sight.</span>\n\n<span class="cm">// \u274c PRINCIPLE 3: \u201cFavor composition over inheritance\u201d</span>\n<span class="cm">//    These display references are baked INTO WeatherData.</span>\n<span class="cm">//    We can\u2019t change them at runtime. No flexible composition.</span>'}],callout:'problem',calloutText:'Three principles, three failures. This code can\u2019t handle change \u2014 add a HeatIndexDisplay? Edit WeatherData. Remove Statistics? Edit WeatherData. Every change forces us back into this class. Let\u2019s fix it, one principle at a time.'},{pill:'principle',pillLabel:'Principle 1',title:'Apply: \u201cEncapsulate what varies\u201d',subtitle:'What varies in our code? The list of displays we notify. Today it\u2019s three \u2014 tomorrow it might be ten. We need to separate the \u201cwho to notify\u201d from the \u201chow to notify\u201d so changes to one don\u2019t affect the other.',principleBox:'Principle from Ch 1: <strong>Encapsulate what varies.</strong> Identify the aspects of your application that vary and separate them from what stays the same.',panels:[{type:'code',label:'\u274c Before \u2014 varying part baked in',full:false,code:'<span class="cm">// The part that VARIES is buried</span>\n<span class="cm">// inside measurementsChanged()</span>\n\npublic void measurementsChanged() {\n  float temp = getTemperature();\n  float humidity = getHumidity();\n  float pressure = getPressure();\n\n  <span class="hi-r">// THESE LINES CHANGE when we</span>\n  <span class="hi-r">// add or remove displays:</span>\n  <span class="hi-r">display1.update(temp, hum, pres);</span>\n  <span class="hi-r">display2.update(temp, hum, pres);</span>\n  <span class="hi-r">display3.update(temp, hum, pres);</span>\n  <span class="hi-r">// display4 someday?</span>\n  <span class="hi-r">// display5 someday??</span>\n}'},{type:'code',label:'\u2705 After \u2014 varying part extracted',full:false,code:'<span class="cm">// EXTRACT \u201cwho to notify\u201d into a</span>\n<span class="cm">// separate, manageable structure</span>\n\n<span class="hi-g">// The varying part: a dynamic list</span>\n<span class="hi-g">private List&lt;???&gt; observers;</span>\n\npublic void measurementsChanged() {\n  float temp = getTemperature();\n  float humidity = getHumidity();\n  float pressure = getPressure();\n\n  <span class="hi-g">// Now we loop over the list</span>\n  <span class="hi-g">for (??? obs : observers) {</span>\n  <span class="hi-g">  obs.update(temp, hum, pres);</span>\n  <span class="hi-g">}</span>\n}\n\n<span class="cm">// But what TYPE goes in the list?</span>\n<span class="cm">// We need an interface! \u2192\u2192\u2192</span>'}],callout:'principle',calloutText:'We\u2019ve extracted the varying part (which displays to notify) into a dynamic list. Now adding or removing a display won\u2019t require editing measurementsChanged(). But the list needs a type \u2014 we can\u2019t just put \u201c???\u201d there. That brings us to Principle 2.'},{pill:'principle',pillLabel:'Principle 2',title:'Apply: \u201cProgram to interfaces, not implementations\u201d',subtitle:'Our list needs a type. If we used concrete classes, we\u2019d be right back where we started. Instead: define an Observer interface. Every display implements it. WeatherData only ever talks to the interface.',principleBox:'Principle from Ch 1: <strong>Program to interfaces, not implementations.</strong> Don\u2019t declare variables with concrete types \u2014 depend on abstractions so you can swap implementations freely.',panels:[{type:'code',label:'\u274c Before \u2014 concrete types',full:false,code:'<span class="cm">// WRONG: if we used concrete types</span>\n<span class="hi-r">private CurrentConditionsDisplay d1;</span>\n<span class="hi-r">private StatisticsDisplay d2;</span>\n<span class="hi-r">private ForecastDisplay d3;</span>\n\n<span class="cm">// WeatherData knows EVERY class.</span>\n<span class="cm">// New display = new field + new import</span>\n<span class="cm">// + change to measurementsChanged()</span>\n\n<span class="cm">// The list from step 3?</span>\n<span class="hi-r">List&lt;CurrentConditionsDisplay&gt;?</span>\n<span class="cm">// That\u2019s STILL a concrete type!</span>'},{type:'code',label:'\u2705 After \u2014 interface type',full:false,code:'<span class="cm">// Define an interface for ALL observers</span>\n<span class="hi-b">public interface Observer {</span>\n<span class="hi-b">  void update(float temp,</span>\n<span class="hi-b">              float humidity,</span>\n<span class="hi-b">              float pressure);</span>\n<span class="hi-b">}</span>\n\n<span class="cm">// WeatherData only knows this interface</span>\n<span class="hi-g">private List&lt;Observer&gt; observers;</span>\n\n<span class="cm">// Any class implementing Observer</span>\n<span class="cm">// can be in that list. WeatherData</span>\n<span class="cm">// never imports a display class.</span>'}],callout:'principle',calloutText:'Now WeatherData depends on the Observer <em>interface</em> \u2014 not on any concrete display class. New display type? Just implement Observer. WeatherData never changes. The \u201c???\u201d from the last step is now answered: it\u2019s Observer.'},{pill:'principle',pillLabel:'Principle 2 cont\u2019d',title:'See how the architecture transforms',subtitle:'Let\u2019s look at the class diagram before and after applying \u201cProgram to interfaces.\u201d The hard-coded arrows collapse into a single dependency on the Observer interface.',panels:[{type:'diagram',label:'\u274c Before: concrete dependencies',full:false,html:'<div class="cd-label">WeatherData \u2192 every concrete display</div><div class="cd-row"><div class="cd-box bad" style="min-width:155px"><div class="cd-h">WeatherData</div><div class="cd-m">\u2192 CurrentCond<br>\u2192 Statistics<br>\u2192 Forecast<br>\u2192 ???</div></div></div><div class="cd-arr">knows each concrete class \u2193</div><div class="cd-row"><div class="cd-box bad"><div class="cd-h">CurrentCond</div></div><div class="cd-box bad"><div class="cd-h">Statistics</div></div><div class="cd-box bad"><div class="cd-h">Forecast</div></div></div><div class="cd-note">N displays = N dependencies inside WeatherData</div>'},{type:'diagram',label:'\u2705 After: one interface dependency',full:false,html:'<div class="cd-label">WeatherData \u2192 Observer interface only</div><div class="cd-row"><div class="cd-box ctx" style="min-width:155px"><div class="cd-h">WeatherData</div><div class="cd-m">observers: List&lt;Observer&gt;</div></div></div><div class="cd-arr">depends on \u2193</div><div class="cd-row"><div class="cd-box iface"><div class="cd-h">\u00abinterface\u00bb<br>Observer</div><div class="cd-m">update()</div></div></div><div class="cd-arr">\u25b3 implements</div><div class="cd-row"><div class="cd-box obs"><div class="cd-h">CurrentCond</div></div><div class="cd-box obs"><div class="cd-h">Statistics</div></div><div class="cd-box obs"><div class="cd-h">Forecast</div></div><div class="cd-box" style="border-style:dashed"><div class="cd-h">Any future<br>display</div></div></div><div class="cd-note">ONE dependency. Unlimited displays. Zero changes to WeatherData.</div>'}],callout:'principle',calloutText:'This is a dramatic structural change. WeatherData went from knowing every concrete display to knowing only a single interface. The coupling collapsed from N dependencies to exactly 1.'},{pill:'principle',pillLabel:'Principle 3',title:'Apply: \u201cFavor composition over inheritance\u201d',subtitle:'We need the ability to add and remove observers at runtime. That means we can\u2019t bake them in at compile time \u2014 we need a dynamic HAS-A relationship. WeatherData HAS-A list of observers, managed at runtime through register/remove methods.',principleBox:'Principle from Ch 1: <strong>Favor composition over inheritance.</strong> HAS-A can be more flexible than IS-A. Compose behavior by holding references to objects, allowing runtime changes.',panels:[{type:'code',label:'Composition = register/remove at runtime',full:false,code:'public class WeatherData {\n\n  <span class="hi-g">// HAS-A list of observers (composition)</span>\n  <span class="hi-g">private List&lt;Observer&gt; observers</span>\n  <span class="hi-g">    = new ArrayList&lt;&gt;();</span>\n\n  <span class="cm">// Add at runtime</span>\n  <span class="hi-g">public void registerObserver(Observer o){</span>\n  <span class="hi-g">  observers.add(o);</span>\n  <span class="hi-g">}</span>\n\n  <span class="cm">// Remove at runtime</span>\n  <span class="hi-g">public void removeObserver(Observer o) {</span>\n  <span class="hi-g">  observers.remove(o);</span>\n  <span class="hi-g">}</span>\n\n  <span class="cm">// Notify whoever is currently in the list</span>\n  public void notifyObservers() {\n    for (Observer o : observers) {\n      o.update(temp, humidity, pressure);\n    }\n  }\n}'},{type:'diagram',label:'Composition in the diagram',full:false,html:'<div class="cd-label">HAS-A \u25c7 relationship (not IS-A \u25b3)</div><div class="cd-row"><div class="cd-box ctx" style="min-width:170px"><div class="cd-h">WeatherData</div><div class="cd-b" style="color:var(--teal-600)">\u25c7 observers: List&lt;Observer&gt;</div><div class="cd-m">registerObserver()<br>removeObserver()<br>notifyObservers()</div></div></div><div class="cd-arr">\u25c7\u2500\u2500 HAS-A (dynamic, runtime) \u2500\u2500\u25b7</div><div class="cd-row"><div class="cd-box iface"><div class="cd-h">\u00abinterface\u00bb<br>Observer</div><div class="cd-m">update()</div></div></div><div class="cd-note">The diamond \u25c7 means composition.<br>Observers can be added and removed anytime \u2014 no recompile needed.</div>'}],callout:'principle',calloutText:'Composition gives us runtime flexibility: register a new display \u2192 it gets notified. Remove it \u2192 silence. We never recompile WeatherData. This is the power of HAS-A over hard-coded references.'},{pill:'pattern',pillLabel:'Revelation',title:'Wait\u2026 what we just built has a name',subtitle:'By applying our three principles one at a time, we\u2019ve arrived at a well-known design: the Observer Pattern. Think of it like a newspaper subscription \u2014 a publisher (Subject) sends updates to all subscribers (Observers) without knowing who they are.',panels:[{type:'diagram',label:'The newspaper analogy',full:true,html:'<div class="cd-label">Publishers + Subscribers = Observer Pattern</div><div class="cd-row"><div class="cd-box ctx" style="min-width:180px"><div class="cd-h">Subject (Publisher)</div><div class="cd-b">state: data</div><div class="cd-m">subscribe(observer)<br>unsubscribe(observer)<br>notifyAll()</div></div></div><div class="cd-arr">\u2500\u2500 \u201chey, I changed!\u201d \u2192 notifies one-to-many \u2500\u2500\u25b7</div><div class="cd-row"><div class="cd-box obs"><div class="cd-h">Observer A<br><small>\ud83d\udc15 Dog</small></div><div class="cd-m">update() \u2192 got it!</div></div><div class="cd-box obs"><div class="cd-h">Observer B<br><small>\ud83d\udc08 Cat</small></div><div class="cd-m">update() \u2192 got it!</div></div><div class="cd-box obs"><div class="cd-h">Observer C<br><small>\ud83e\udd86 Duck</small></div><div class="cd-m">update() \u2192 got it!</div></div></div><div style="height:12px"></div><div style="text-align:center;font-size:13.5px;line-height:1.6;color:var(--text-primary);max-width:560px;margin:0 auto"><strong>The Observer Pattern</strong> defines a one-to-many dependency between objects so that when one object changes state, all of its dependents are notified and updated automatically.</div>'}],callout:'pattern',calloutText:'We didn\u2019t start by memorizing a pattern \u2014 we started with broken code and applied principles. The Observer Pattern is what you naturally arrive at when you encapsulate what varies, program to interfaces, and favor composition. Principles \u2192 Structure \u2192 Pattern.'},{pill:'principle',pillLabel:'New Principle',title:'Chapter 2\u2019s new principle: Loose Coupling',subtitle:'The Observer Pattern embodies a fourth principle. The Subject and Observers interact \u2014 but they know almost nothing about each other. This is loose coupling, and it\u2019s what makes the whole thing resilient to change.',principleBox:'<strong>NEW Design Principle:</strong> Strive for loosely coupled designs between objects that interact. Loosely coupled designs allow us to build flexible OO systems that handle change because they minimize interdependency.',panels:[{type:'diagram',label:'Why Observer is loosely coupled',full:true,html:'<div style="font-family:\'DM Sans\',sans-serif;font-size:12.5px;line-height:1.8;color:var(--text-primary);max-width:620px;margin:0 auto"><div style="margin-bottom:8px"><span style="color:var(--teal-600);font-weight:700">\u2713</span> \u00a0Subject only knows observers implement the <strong>Observer interface</strong> \u2014 not their concrete class, not what they do.</div><div style="margin-bottom:8px"><span style="color:var(--teal-600);font-weight:700">\u2713</span> \u00a0We can <strong>add new observer types at any time</strong> without modifying the Subject.</div><div style="margin-bottom:8px"><span style="color:var(--teal-600);font-weight:700">\u2713</span> \u00a0We can <strong>add or remove observer instances at runtime</strong>. Subject just sees the list shrink or grow.</div><div style="margin-bottom:8px"><span style="color:var(--teal-600);font-weight:700">\u2713</span> \u00a0We can <strong>reuse subjects and observers independently</strong>. They aren\u2019t tied together.</div><div><span style="color:var(--teal-600);font-weight:700">\u2713</span> \u00a0<strong>Changes to either side don\u2019t affect the other</strong>, as long as they honor their interfaces.</div></div>'}],callout:'principle',calloutText:'This is the payoff of the three principles working together. Encapsulation + interfaces + composition = a system where the Subject and Observers can evolve independently. That\u2019s loose coupling \u2014 your new fourth principle.'},{pill:'solution',pillLabel:'Implementation',title:'Full code: the three interfaces',subtitle:'Now let\u2019s write the real, complete code. We formalize Subject (for WeatherData), Observer (for displays), and DisplayElement (so every panel can render itself).',panels:[{type:'code',label:'The three interfaces',full:false,code:'<span class="hi-b">public interface Subject {</span>\n  void registerObserver(Observer o);\n  void removeObserver(Observer o);\n  void notifyObservers();\n<span class="hi-b">}</span>\n\n<span class="hi-b">public interface Observer {</span>\n  void update(float temp,\n              float humidity,\n              float pressure);\n<span class="hi-b">}</span>\n\n<span class="hi-b">public interface DisplayElement {</span>\n  void display();\n<span class="hi-b">}</span>'},{type:'diagram',label:'Class diagram \u2014 interfaces layer',full:false,html:'<div class="cd-label">Three contracts defined</div><div class="cd-row"><div class="cd-box iface"><div class="cd-h">\u00abinterface\u00bb<br>Subject</div><div class="cd-m">registerObserver(Observer)<br>removeObserver(Observer)<br>notifyObservers()</div></div><div class="cd-box iface"><div class="cd-h">\u00abinterface\u00bb<br>Observer</div><div class="cd-m">update(temp, hum, pres)</div></div></div><div style="height:4px"></div><div class="cd-row"><div class="cd-box iface" style="min-width:105px"><div class="cd-h">\u00abinterface\u00bb<br>DisplayElement</div><div class="cd-m">display()</div></div></div><div class="cd-note">Every display implements both Observer (to get data) and DisplayElement (to render).</div>'}],callout:'success',calloutText:'These three interfaces are the backbone. Subject handles registration/notification. Observer defines the callback contract. DisplayElement ensures every panel can show itself. Nothing concrete yet \u2014 just contracts.'},{pill:'solution',pillLabel:'Implementation',title:'Full code: WeatherData implements Subject',subtitle:'WeatherData maintains a list of Observers and notifies them all when measurements change. Compare this to our first attempt \u2014 measurementsChanged() is now one line.',panels:[{type:'code',label:'WeatherData.java \u2014 final version',full:false,code:'public class WeatherData\n    <span class="hi-g">implements Subject</span> {\n\n  <span class="hi-b">private List&lt;Observer&gt; observers</span>\n      = new ArrayList&lt;&gt;();\n  private float temperature;\n  private float humidity;\n  private float pressure;\n\n  public void <span class="hi-g">registerObserver</span>(Observer o){\n    observers.add(o);\n  }\n  public void <span class="hi-g">removeObserver</span>(Observer o) {\n    observers.remove(o);\n  }\n  public void <span class="hi-g">notifyObservers</span>() {\n    for (Observer o : observers) {\n      o.update(temperature,\n               humidity, pressure);\n    }\n  }\n\n  public void measurementsChanged() {\n    <span class="hi-g">notifyObservers();</span> <span class="cm">// that\'s it!</span>\n  }\n  <span class="cm">// setMeasurements(), getters...</span>\n}'},{type:'diagram',label:'Class diagram',full:false,html:'<div class="cd-label">WeatherData as concrete Subject</div><div class="cd-row"><div class="cd-box iface"><div class="cd-h">\u00abinterface\u00bb Subject</div><div class="cd-m">registerObserver()<br>removeObserver()<br>notifyObservers()</div></div></div><div class="cd-arr">\u25b3 implements</div><div class="cd-row"><div class="cd-box ctx" style="min-width:185px"><div class="cd-h">WeatherData</div><div class="cd-b">observers: List&lt;Observer&gt;<br>temperature, humidity, pressure</div><div class="cd-m">registerObserver()<br>removeObserver()<br>notifyObservers()<br>measurementsChanged()<br>getTemperature() \u2026</div></div></div><div class="cd-arr">\u25c7\u2500\u2500\u2500 has-many \u2500\u2500\u2500\u25b7 Observer</div><div class="cd-note">measurementsChanged() is now ONE line: notifyObservers().<br>Compare that to the three hard-coded lines we started with!</div>'}],callout:'success',calloutText:'The method that was a liability is now a strength. measurementsChanged() just says \u201chey, something changed.\u201d It has zero knowledge of who\u2019s listening or what they do with the data.'},{pill:'solution',pillLabel:'Implementation',title:'Full code: Displays implement Observer',subtitle:'Each display registers itself with the Subject in its constructor. When update() fires, it stores the data it cares about and calls display(). Notice: the constructor takes Subject, not WeatherData.',panels:[{type:'code',label:'CurrentConditionsDisplay.java',full:false,code:'public class CurrentConditionsDisplay\n    <span class="hi-g">implements Observer,</span>\n    <span class="hi-g">         DisplayElement</span> {\n\n  private float temperature;\n  private float humidity;\n  <span class="hi-b">private Subject weatherData;</span>\n\n  public CurrentConditionsDisplay(\n      <span class="hi-b">Subject weatherData</span>) {\n    this.weatherData = weatherData;\n    <span class="hi-g">weatherData.registerObserver(this);</span>\n    <span class="cm">// I register MYSELF</span>\n  }\n\n  public void <span class="hi-g">update</span>(float temp,\n      float hum, float pressure) {\n    this.temperature = temp;\n    this.humidity = hum;\n    display();\n  }\n\n  public void <span class="hi-g">display</span>() {\n    System.out.println(\n      "Current: " + temperature\n      + "F, " + humidity + "%");\n  }\n}'},{type:'diagram',label:'Full architecture',full:false,html:'<div class="cd-label">Complete Observer Pattern class diagram</div><div class="cd-row"><div class="cd-box iface"><div class="cd-h">\u00abinterface\u00bb<br>Subject</div></div><div class="cd-box iface"><div class="cd-h">\u00abinterface\u00bb<br>Observer</div></div><div class="cd-box iface"><div class="cd-h">\u00abinterface\u00bb<br>DisplayElement</div></div></div><div class="cd-arr">\u25b3 &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; \u25b3 implements both \u2191</div><div class="cd-row"><div class="cd-box ctx"><div class="cd-h">WeatherData</div></div></div><div class="cd-arr">\u25c7\u2500\u2500\u2500 notifies \u2500\u2500\u2500\u25b7</div><div class="cd-row"><div class="cd-box obs"><div class="cd-h">CurrentCond</div><div class="cd-m">update()<br>display()</div></div><div class="cd-box obs"><div class="cd-h">Statistics</div><div class="cd-m">update()<br>display()</div></div><div class="cd-box obs"><div class="cd-h">Forecast</div><div class="cd-m">update()<br>display()</div></div><div class="cd-box" style="border-style:dashed"><div class="cd-h">ThirdParty?</div><div class="cd-m">update()<br>display()</div></div></div><div class="cd-note">Both sides program to interfaces. Both sides use composition. Fully loosely coupled.</div>'}],callout:'success',calloutText:'Notice: the constructor takes Subject, not WeatherData. Both sides program to interfaces. The display could work with any Subject, and the Subject works with any Observer. All four principles are satisfied.'},{pill:'solution',pillLabel:'Integration',title:'Test harness \u2014 see it run',subtitle:'Create a WeatherData, create some displays (they self-register), then simulate weather changes. Every registered display auto-updates.',panels:[{type:'code',label:'WeatherStation.java',full:false,code:'public class WeatherStation {\n  public static void main(String[] args){\n\n    <span class="hi-b">WeatherData wd = new WeatherData();</span>\n\n    <span class="cm">// Each display self-registers</span>\n    <span class="hi-g">new CurrentConditionsDisplay(wd);</span>\n    <span class="hi-g">new StatisticsDisplay(wd);</span>\n    <span class="hi-g">new ForecastDisplay(wd);</span>\n\n    <span class="cm">// Simulate weather changes</span>\n    <span class="hi-y">wd.setMeasurements(80, 65, 30.4f);</span>\n    <span class="hi-y">wd.setMeasurements(82, 70, 29.2f);</span>\n    <span class="hi-y">wd.setMeasurements(78, 90, 29.2f);</span>\n  }\n}'},{type:'diagram',label:'Console output',full:false,html:'<div class="cd-label">Runtime behavior</div><div class="runtime-box"><span class="rl">// setMeasurements(80, 65, 30.4f)</span>\n<span class="rv">Current: 80.0F, 65.0% humidity</span>\n<span class="rv">Avg/Max/Min temp = 80.0/80.0/80.0</span>\n<span class="rv">Forecast: Improving weather!</span>\n\n<span class="rl">// setMeasurements(82, 70, 29.2f)</span>\n<span class="rv">Current: 82.0F, 70.0% humidity</span>\n<span class="rv">Avg/Max/Min temp = 81.0/82.0/80.0</span>\n<span class="rw">Forecast: Cooler, rainy weather</span>\n\n<span class="rl">// setMeasurements(78, 90, 29.2f)</span>\n<span class="rv">Current: 78.0F, 90.0% humidity</span>\n<span class="rv">Avg/Max/Min temp = 80.0/82.0/78.0</span>\n<span class="rv">Forecast: More of the same</span></div><div class="cd-note">Want a HeatIndexDisplay? Write the class, pass <code>wd</code>. Zero changes to WeatherData.</div>'}],callout:'success',calloutText:'Three setMeasurements calls \u2192 three rounds of notifications \u2192 every display updates automatically. The CEO wants a HeatIndex display? Write the class, pass it the subject, done. That\u2019s the payoff of applying those three principles.'},{pill:'fix',pillLabel:'Trade-off',title:'Push vs Pull: who controls the data flow?',subtitle:'Right now we\u2019re \u201cpushing\u201d all values to every observer. But what if an observer only needs temperature? The \u201cpull\u201d model lets observers request only what they need via getters.',panels:[{type:'code',label:'Push (current) vs Pull (preferred)',full:false,code:'<span class="cm">// \u2500\u2500\u2500 PUSH MODEL (current) \u2500\u2500\u2500</span>\n<span class="cm">// Subject decides what data to send</span>\n<span class="hi-y">observer.update(temp, hum, pres);</span>\n\n<span class="cm">// Problem: add windSpeed later?</span>\n<span class="cm">// \u2192 Change update() signature</span>\n<span class="cm">// \u2192 Change EVERY observer</span>\n\n<span class="cm">// \u2500\u2500\u2500 PULL MODEL (preferred) \u2500\u2500\u2500</span>\n<span class="cm">// Subject says \u201cI changed\u201d</span>\n<span class="hi-g">observer.update();</span>\n\n<span class="cm">// Observer pulls what it needs:</span>\n<span class="hi-g">float t = subject.getTemperature();</span>\n<span class="cm">// New field? Only interested</span>\n<span class="cm">// observers call the new getter.</span>\n<span class="cm">// No signature changes anywhere.</span>'},{type:'diagram',label:'Comparison',full:false,html:'<div class="ba-grid"><div><div class="cd-label">Push</div><div class="cd-row"><div class="cd-box dup" style="min-width:100px"><div class="cd-h">Subject</div><div class="cd-m">\u2192 sends ALL data<br>\u2192 every time<br>\u2192 to everyone<br><br>Add a field?<br>Every observer<br>must change.</div></div></div></div><div><div class="cd-label">Pull \u2713</div><div class="cd-row"><div class="cd-box good" style="min-width:100px"><div class="cd-h">Subject</div><div class="cd-m">\u2192 says \u201cI changed\u201d<br>\u2192 observers ask<br>\u2192 get only what<br>\u00a0\u00a0 they need<br><br>Add a field?<br>Only new getter.<br>Existing obs: fine.</div></div></div></div></div><div class="cd-note">Pull is considered more \u201ccorrect\u201d \u2014 more flexible as the Subject grows.</div>'}],callout:'warning',calloutText:'Push is simpler for small systems. Pull is preferred long-term \u2014 observers are independent of the Subject\u2019s state shape. Adding windSpeed only affects the one observer that cares about wind.'},{pill:'problem',pillLabel:'Caution',title:'The dark side of java.util.Observable',subtitle:'Java provides a built-in Observable class. Convenient \u2014 but it violates the very principles we just applied! It\u2019s a <em>class</em> (not an interface), and setChanged() is <em>protected</em> (blocking composition).',principleBox:'java.util.Observable is a <strong>class</strong>, not an interface. This one design choice violates two of our principles simultaneously.',panels:[{type:'code',label:'What goes wrong',full:false,code:'<span class="cm">// \u274c PRINCIPLE 2: \u201cProgram to interfaces\u201d</span>\n<span class="cm">// Observable is a CLASS. No interface.</span>\npublic class WeatherData\n  <span class="hi-r">extends Observable</span> { ... }\n\n<span class="cm">// Already extending something?</span>\npublic class MyWidget\n  <span class="hi-r">extends JFrame</span> {\n  <span class="cm">// Can\u2019t ALSO extend Observable!</span>\n  <span class="cm">// Java has no multiple inheritance.</span>\n}\n\n<span class="cm">// \u274c PRINCIPLE 3: \u201cFavor composition\u201d</span>\n<span class="cm">// Could we compose it instead?</span>\n<span class="hi-r">// NO \u2014 setChanged() is protected!</span>\n<span class="cm">// You literally cannot call it</span>\n<span class="cm">// unless you\u2019re a subclass.</span>'},{type:'diagram',label:'Principles violated',full:false,html:'<div class="cd-label">java.util.Observable: a cautionary tale</div><div class="cd-row"><div class="cd-box bad" style="min-width:170px"><div class="cd-h">Observable<br><small>(CLASS, not interface!)</small></div><div class="cd-m">addObserver()<br>deleteObserver()<br>notifyObservers()<br><span style="color:var(--text-danger)">setChanged() \u2190 protected</span></div></div></div><div class="cd-arr">forced to extend (no choice) \u2193</div><div class="cd-row"><div class="cd-box dup"><div class="cd-h">WeatherData</div><div class="cd-m">Can\u2019t extend anything else<br>Can\u2019t compose Observable<br>\ud83d\udd12 Locked into inheritance</div></div></div><div style="height:8px"></div><div style="font-family:\'DM Sans\',sans-serif;font-size:11.5px;line-height:1.6;color:var(--text-secondary);text-align:center">\u274c Violates \u201cProgram to interfaces\u201d<br>\u274c Violates \u201cFavor composition over inheritance\u201d<br>Lesson: don\u2019t be afraid to roll your own.</div>'}],callout:'problem',calloutText:'Even the JDK gets it wrong sometimes. java.util.Observable forces you into inheritance with no composition escape hatch. When you need flexibility, roll your own Observer implementation like we did \u2014 the principles always point you in the right direction.'},{pill:'pattern',pillLabel:'The Pattern',title:'The Observer Pattern \u2014 complete',subtitle:'Defines a one-to-many dependency between objects so that when one object changes state, all of its dependents are notified and updated automatically.',panels:[{type:'diagram',label:'Complete class diagram',full:true,html:'<div class="cd-label">The Observer Pattern \u2014 Final Architecture</div><div class="cd-row"><div class="cd-box iface" style="min-width:165px"><div class="cd-h">\u00abinterface\u00bb<br>Subject</div><div class="cd-m">registerObserver(Observer)<br>removeObserver(Observer)<br>notifyObservers()</div></div><div class="cd-box iface" style="min-width:125px"><div class="cd-h">\u00abinterface\u00bb<br>Observer</div><div class="cd-m">update()</div></div><div class="cd-box iface" style="min-width:115px"><div class="cd-h">\u00abinterface\u00bb<br>DisplayElement</div><div class="cd-m">display()</div></div></div><div class="cd-arr">\u25b3 implements &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; \u25b3 implements both \u2191</div><div class="cd-row"><div class="cd-box ctx" style="min-width:190px"><div class="cd-h">WeatherData</div><div class="cd-b">observers: List&lt;Observer&gt;<br>temperature, humidity, pressure</div><div class="cd-m">registerObserver()<br>removeObserver()<br>notifyObservers()<br>getTemperature() / getHumidity()<br>getPressure()</div></div></div><div class="cd-arr">\u25c7\u2500\u2500\u2500\u2500\u2500 has-many \u2500\u2500\u2500\u2500\u2500\u25b7</div><div class="cd-row"><div class="cd-box obs"><div class="cd-h">CurrentCond</div><div class="cd-m">update()<br>display()</div></div><div class="cd-box obs"><div class="cd-h">Statistics</div><div class="cd-m">update()<br>display()</div></div><div class="cd-box obs"><div class="cd-h">Forecast</div><div class="cd-m">update()<br>display()</div></div><div class="cd-box" style="border-style:dashed"><div class="cd-h">Your Display?</div><div class="cd-m">update()<br>display()</div></div></div><div class="cd-note">Any class implementing Observer + DisplayElement plugs right in. Zero changes to WeatherData.</div>'}],callout:'pattern',calloutText:'This entire architecture emerged from applying three OO principles to broken code. The Observer Pattern isn\u2019t something you memorize \u2014 it\u2019s something you arrive at by thinking about encapsulation, interfaces, and composition.'},{pill:'pattern',pillLabel:'Toolbox',title:'The full journey \u2014 and your updated toolbox',subtitle:'Let\u2019s recap the path from broken code to clean architecture, and the new tools you\u2019ve earned.',panels:[{type:'diagram',label:'The principle-driven journey',full:true,html:'<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px"><div><div class="cd-label">The journey we took</div><div style="font-family:\'DM Sans\',sans-serif;font-size:12px;line-height:2;color:var(--text-primary)"><div><span style="display:inline-block;width:20px;height:20px;border-radius:50%;background:var(--bg-secondary);text-align:center;font-size:10px;line-height:20px;font-weight:700;margin-right:6px">1</span> Naive code \u2014 hard-coded displays</div><div><span style="display:inline-block;width:20px;height:20px;border-radius:50%;background:var(--bg-danger);text-align:center;font-size:10px;line-height:20px;font-weight:700;color:var(--text-danger);margin-right:6px">2</span> Diagnosed with Ch 1 principles</div><div><span style="display:inline-block;width:20px;height:20px;border-radius:50%;background:var(--bg-info);text-align:center;font-size:10px;line-height:20px;font-weight:700;color:var(--text-info);margin-right:6px">3</span> Encapsulate what varies \u2192 List</div><div><span style="display:inline-block;width:20px;height:20px;border-radius:50%;background:var(--bg-info);text-align:center;font-size:10px;line-height:20px;font-weight:700;color:var(--text-info);margin-right:6px">4</span> Program to interfaces \u2192 Observer</div><div><span style="display:inline-block;width:20px;height:20px;border-radius:50%;background:var(--bg-info);text-align:center;font-size:10px;line-height:20px;font-weight:700;color:var(--text-info);margin-right:6px">5</span> Favor composition \u2192 register/remove</div><div><span style="display:inline-block;width:20px;height:20px;border-radius:50%;background:var(--purple-50);text-align:center;font-size:10px;line-height:20px;font-weight:700;color:var(--purple-600);margin-right:6px">6</span> Result = Observer Pattern!</div><div><span style="display:inline-block;width:20px;height:20px;border-radius:50%;background:var(--bg-success);text-align:center;font-size:10px;line-height:20px;font-weight:700;color:var(--text-success);margin-right:6px">7</span> New principle: Loose Coupling</div></div></div><div><div class="cd-label">OO Principles (all 4 now)</div><div class="cd-box good" style="max-width:none;min-width:auto;margin-bottom:5px"><div class="cd-m">Encapsulate what varies</div></div><div class="cd-box good" style="max-width:none;min-width:auto;margin-bottom:5px"><div class="cd-m">Favor composition over inheritance</div></div><div class="cd-box good" style="max-width:none;min-width:auto;margin-bottom:5px"><div class="cd-m">Program to interfaces, not implementations</div></div><div class="cd-box" style="max-width:none;min-width:auto;border-color:var(--purple-600);background:var(--purple-50);margin-bottom:14px"><div class="cd-m" style="color:var(--purple-600);font-weight:600">\u2605 Strive for loosely coupled designs</div></div><div class="cd-label">OO Patterns (2 now)</div><div class="cd-box" style="max-width:none;min-width:auto;margin-bottom:5px"><div class="cd-h">Strategy</div><div class="cd-m" style="font-size:9.5px">Encapsulates algorithms, makes them interchangeable</div></div><div class="cd-box" style="max-width:none;min-width:auto;border-color:var(--purple-600);background:var(--purple-50)"><div class="cd-h" style="color:var(--purple-600)">\u2605 Observer</div><div class="cd-m" style="color:var(--purple-600);font-size:9.5px">One-to-many dependency; when one changes state, all dependents are notified automatically</div></div></div></div>'}],callout:'pattern',calloutText:'Principles aren\u2019t decoration \u2014 they\u2019re engineering tools. Each one drove a specific code change, and together they produced a pattern. That\u2019s the real lesson of Chapter 2: patterns emerge from principles applied to problems.'}];

let cur=0;
function render(){const s=S[cur],total=S.length;document.getElementById('progressFill').style.width=((cur+1)/total*100)+'%';document.getElementById('dotsContainer').innerHTML=S.map((_,i)=>`<div class="dot${i===cur?' active':i<cur?' visited':''}" onclick="jumpTo(${i})"></div>`).join('');document.getElementById('prevBtn').disabled=cur===0;const nb=document.getElementById('nextBtn');nb.disabled=cur===total-1;nb.innerHTML=cur===total-1?'Done &#10003;':'Next &#8594;';const pc={try:'pill-try',problem:'pill-problem',fix:'pill-fix',principle:'pill-principle',solution:'pill-solution',pattern:'pill-pattern'}[s.pill];const cc={problem:'callout-problem',warning:'callout-warning',principle:'callout-principle',success:'callout-success',pattern:'callout-pattern'}[s.callout]||'';let ph='';if(s.panels){ph='<div class="panels">'+s.panels.map(p=>{const fc=p.full?' full-panel':'';return p.type==='code'?`<div class="panel${fc}"><div class="panel-header">${p.label}</div><div class="panel-code">${p.code}</div></div>`:`<div class="panel${fc}"><div class="panel-header">${p.label}</div><div class="panel-diagram">${p.html}</div></div>`;}).join('')+'</div>';}let pb=s.principleBox?`<div class="principle-box"><div class="plabel">Design Principle</div>${s.principleBox}</div>`:'';document.getElementById('stepContainer').innerHTML=`<div class="step-content"><div class="step-header"><div class="step-meta"><span class="pill ${pc}">${s.pillLabel}</span><span class="step-num">Step ${cur+1} of ${total}</span></div><div class="step-title">${s.title}</div><div class="step-subtitle">${s.subtitle}</div></div><div class="step-body">${pb}${ph}</div><div class="callout ${cc}">${s.calloutText}</div></div>`;}
function go(d){const n=cur+d;if(n>=0&&n<S.length){cur=n;render();}}
function jumpTo(i){cur=i;render();}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')go(1);if(e.key==='ArrowLeft')go(-1);});
function toggleTheme(){const h=document.documentElement;h.setAttribute('data-theme',h.getAttribute('data-theme')==='dark'?'light':'dark');}
render();
</script>
