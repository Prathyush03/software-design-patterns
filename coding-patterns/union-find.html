    --teal-50: #E1F5EE; --teal-600: #0F6E56; --teal-800: #085041;

    --bg-info: #0c2d4a;
    --bg-danger: #3d1515;
    --bg-success: #1a3008;
    --bg-warning: #3d2804;
    --text-primary: #e8e6df;
    --text-secondary: #a5a39b;
    --text-tertiary: #7a786f;

  .rc-txt { padding: 8px 12px; font-size: 12.5px; color: var(--text-primary); line-height: 1.55; }
  .rc-txt code { font-family: var(--font-mono); font-size: 11.5px; background: var(--bg-secondary); padding: 1px 4px; border-radius: 3px; }

  .sum-wrap { border: 0.5px solid var(--border-tertiary); border-radius: var(--radius-sm); overflow: hidden; overflow-x: auto; margin-bottom: 14px; }
  .sum-tbl { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 600px; }
  .sum-tbl th { text-align: left; padding: 8px 10px; background: var(--bg-secondary); font-weight: 500; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-secondary); border-bottom: 0.5px solid var(--border-tertiary); }
  .sum-tbl td { padding: 8px 10px; border-bottom: 0.5px solid var(--border-tertiary); vertical-align: top; line-height: 1.5; color: var(--text-primary); }
  .sum-tbl tr:last-child td { border-bottom: none; }
  .sum-tbl td:first-child { font-weight: 500; white-space: nowrap; }
  .col-inv { color: var(--text-info) !important; }
  .col-mov { color: var(--text-warning) !important; }
  .col-har { color: var(--text-success) !important; }

  .callout { border-radius: 0; padding: 10px 14px; font-size: 13px; line-height: 1.6; border-left: 3px solid; background: var(--bg-secondary); }
  .callout-bad { border-left-color: var(--border-danger); color: var(--text-danger); }
  .callout-warn { border-left-color: var(--border-warning); color: var(--text-warning); }
  .callout-ok { border-left-color: var(--border-success); color: var(--text-success); }
  .callout-info { border-left-color: var(--border-info); color: var(--text-info); }
  .callout-purple { border-left-color: var(--purple-600); color: var(--purple-800); }

  .legend { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; font-size: 10px; color: var(--text-secondary); margin-top: 10px; }
  .legend-i { display: flex; align-items: center; gap: 4px; }
  .legend-sw { width: 14px; height: 9px; border-radius: 3px; }

  .bot-nav { display: flex; align-items: center; justify-content: space-between; gap: 12px; background: var(--bg-primary); border: 0.5px solid var(--border-tertiary); border-radius: var(--radius); padding: 14px 20px; }
  .bot-nav button { background: transparent; border: 0.5px solid var(--border-secondary); border-radius: var(--radius-sm); padding: 9px 22px; font-size: 13px; cursor: pointer; color: var(--text-primary); font-family: var(--font-body); font-weight: 500; transition: background 0.15s, transform 0.1s; }
  .bot-nav button:hover { background: var(--bg-secondary); }
  .bot-nav button:active { transform: scale(0.97); }
  .bot-nav button:disabled { opacity: 0.2; cursor: default; }
  .dots { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border-tertiary); cursor: pointer; transition: all 0.25s; }
  .dot.active { background: var(--text-info); width: 22px; border-radius: 4px; }

  .s-content { animation: fadeSlide 0.35s ease; }

  .kbd-hint { text-align: center; font-size: 11px; color: var(--text-tertiary); margin-top: 12px; }
  .kbd-hint kbd { font-family: var(--font-mono); background: var(--bg-secondary); padding: 1px 6px; border-radius: 4px; border: 0.5px solid var(--border-tertiary); font-size: 11px; }
</style>

<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>Chapter 25 — Union Find</h1>
      <p>Grokking Patterns, The Rules Way — same three rules, every implementation changes</p>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">Toggle dark mode</button>
  </div>

  <div class="top-bar">
    <span class="step-label" id="step-label"></span>
    <div class="prog-track"><div class="prog-fill" id="prog"></div></div>
  </div>

  <div class="card" id="sc"></div>

  <div class="bot-nav">
    <button id="pb" onclick="go(cur-1)">&larr; Back</button>
    <div class="dots" id="dots"></div>
    <button id="nb" onclick="go(cur+1)">Next &rarr;</button>
  </div>

  <div class="kbd-hint">Use <kbd>&larr;</kbd> <kbd>&rarr;</kbd> arrow keys to navigate</div>
</div>

<script>
function rulesCard(title, inv, mov, har, bad){
  return '<div class="rules-card"><div class="rc-h'+(bad?' rc-bad':'')+'">'+title+'</div>'
    +'<div class="rc-row"><div class="rc-tag t-inv">Invariant</div><div class="rc-txt">'+inv+'</div></div>'
    +'<div class="rc-row"><div class="rc-tag t-mov">Move</div><div class="rc-txt">'+mov+'</div></div>'
    +'<div class="rc-row"><div class="rc-tag t-har">Harvest</div><div class="rc-txt">'+har+'</div></div></div>';
}

const S=[
{phase:'pill-try',phaseTxt:'The Brief',title:'Number of Provinces',desc:'A new shape of problem: you are handed an <code>n&times;n</code> matrix <code>isConnected</code> where <code>isConnected[i][j] = 1</code> means city <code>i</code> and city <code>j</code> are directly friends. A <strong>province</strong> is a maximal group of cities linked directly or transitively. Count the provinces. Then the interviewer twists it: <strong>friendships arrive one at a time, and after each you must re-report the province count</strong> &mdash; connectivity becomes dynamic.',
code:{h:'The problem',b:`isConnected = [[1,1,0],
               [1,1,0],
               [0,0,1]]

<span class="cm"># cities 0-1 friends, city 2 alone</span>
provinces = 2      <span class="cm"># {0,1} and {2}</span>

<span class="cm"># then friendship (1,2) arrives...
# {0,1,2} &rarr; provinces = 1</span>`},
dia:()=>`<div class="av">
  <div class="ac live">0</div><div class="ac live">1</div><div class="ac">2</div>
</div>
<div class="av-cap">cities 0 and 1 share a province; city <code>2</code> stands alone &rarr; 2 provinces.<br>Now let edges arrive over time and keep answering&hellip;</div>`,
callout:{type:'callout-info',text:'Static, a single scan would do. But "answer after every new edge" is the real task &mdash; dynamic connectivity. Hold that clause; it is the whole story.'}
},
{phase:'pill-try',phaseTxt:'Attempt #1',title:'Brute force — a fresh DFS for every question',desc:'The obvious idea: to count provinces, run DFS from each unvisited city, flooding its whole component, and increment a counter. Correct, and for a single static matrix genuinely fine at <code>O(n&sup2;)</code>. The trouble is the <strong>dynamic</strong> twist &mdash; after each new friendship you must recount, and DFS has no memory, so it rebuilds the entire picture from scratch every time.',
code:{h:'provinces_bruteforce.py',b:`def provinces(M):
    n = len(M)
    seen = [False]*n
    def dfs(i):
        for j in range(n):
            if M[i][j] and not seen[j]:
                seen[j] = True
                dfs(j)
    count = 0
    for i in range(n):
        if not seen[i]:
            seen[i] = True
            dfs(i)               <span class="cm"># flood one province</span>
            count += 1
    return count
<span class="cm"># One scan: O(n&sup2;). But re-run per edge over Q
# queries &rarr; O(Q &times; (V+E)). Q,E ~ 1e5 &rarr; ~1e10 &rarr; TLE.</span>`},
dia:()=>`<div class="av">
  <div class="ac live">0</div><div class="ac live">1</div><div class="ac dead">2</div>
</div>
<div class="av-cap">DFS floods {0,1}, then starts fresh at 2 &rarr; count = 2</div>
<div class="av-gap"></div>
<div class="av">
  <div class="ac hot">0</div><div class="ac hot">1</div><div class="ac hot">2</div>
</div>
<div class="av-cap">edge (1,2) arrives &rarr; the ENTIRE DFS runs again from scratch.<br>Nothing from the last scan was kept.</div>`,
callout:{type:'callout-ok',text:'For one snapshot it is correct and O(n&sup2;) &mdash; no shame there. But every new edge throws the whole traversal away and starts over. The waste is not one query; it is the re-scanning, forever.'}
},
{phase:'pill-ohno',phaseTxt:'Diagnose!',title:'Which rule is violated?',desc:'Earlier chapters gave us three rules. This brute force is not exactly <em>slow</em> on one scan &mdash; it is <strong>forgetful</strong>. Audit it: the failure is repeated recomputation, and the rules point straight at the missing piece.',
code:null,
dia:null,
extra:()=>rulesCard('Rule audit — DFS-per-query vs. the three rules',
 '<span class="viol">&#10007; VIOLATED.</span> DFS keeps <em>no persistent</em> record of connectivity between questions. There is no invariant that survives an edge insertion &mdash; each query re-derives the whole component map from a blank <code>seen[]</code>.',
 '<span style="color:var(--text-warning);font-weight:500">~ WEAK.</span> Its "move" is a full flood, not an incremental merge. Adding a single edge cannot cheaply update the answer; it forces re-exploring all <code>O(V+E)</code>.',
 '<span style="color:var(--text-warning);font-weight:500">~ SURVIVES.</span> Counting components at the end is correct &mdash; but you pay an entire traversal to reach that moment, every single time.',
 true),
callout:{type:'callout-bad',text:'The rules did not change. The brute force refuses to remember what it already proved connected &mdash; so we need a new IMPLEMENTATION of the same three rules, not a new idea: one that accumulates connectivity in near-O(1) per edge.'}
},
{phase:'pill-principle',phaseTxt:'Rule #1 — new implementation',title:'The invariant becomes a forest that remembers',desc:'Stop re-flooding. Keep one array, <code>parent[]</code>: every element points at another until it reaches a <strong>root</strong> that points at itself. Each root names one component. The single fact we maintain: <strong><code>find(x) == find(y)</code> if and only if <code>x</code> and <code>y</code> are connected.</strong> That forest is a persistent, compressed transcript of every connection learned so far &mdash; it is never rebuilt.',
code:{h:'The promise — a disjoint-set forest',b:`parent = list(range(n))   <span class="cm"># each node its own root</span>

<span class="cm"># INVARIANT — true after every operation:</span>
<span class="hi-b">#  find(x) == find(y)  &lt;=&gt;  x, y connected</span>
<span class="cm"># The forest ACCUMULATES connectivity;
# it is never rebuilt between queries.</span>

def find(x):
    while parent[x] != x:  <span class="cm"># walk to the root</span>
        x = parent[x]
    return x               <span class="cm"># root = component id</span>`},
dia:()=>`<div class="av">
  <div class="ac live">0</div><div class="ac live">1</div><div class="ac">2</div>
</div>
<div class="ptr-row"><div class="ptr"><b>root</b></div><div class="ptr">&uarr;0</div><div class="ptr"><b>root</b></div></div>
<div class="av-cap">parent = [0, 0, 2]: node 1 points to root 0; node 2 is its own root.<br>Two roots &rarr; two components &mdash; and this survives into the next query.</div>`,
callout:{type:'callout-info',text:'In Two Pointers the invariant described the discarded OUTSIDE; in Sliding Window the living INSIDE the window. Here it is a PERSISTENT structure that accumulates across time &mdash; the first invariant that is itself a data structure.'},
principle:{lbl:'Rule #1 — Name the invariant (reused)',txt:'Same rule, new implementation: the invariant is a disjoint-set forest where <code>find(x)==find(y)</code> iff <code>x,y</code> are connected. Not a region, not a ratio &mdash; it is memory that grows monotonically with every union.'}
},
{phase:'pill-principle',phaseTxt:'Rule #2 — new implementation',title:'The move: union two roots, irreversibly',desc:'One operation grows the structure: <code>union(a, b)</code> finds both roots and hangs one under the other. Two guards keep it near-instant &mdash; <strong>union by rank</strong> (always attach the shorter tree under the taller, so depth barely grows) and <strong>path compression</strong> (on each <code>find</code>, re-point nodes straight at the root). Merges are <strong>irreversible</strong>: components only ever grow, never split.',
code:{h:'The move — union by rank + compression',b:`def find(x):
    while parent[x] != x:
        parent[x] = parent[parent[x]]  <span class="cm"># compress</span>
        x = parent[x]
    return x

def union(a, b):                 <span class="cm"># MOVE: irreversible merge</span>
    ra, rb = find(a), find(b)
    if ra == rb: return          <span class="cm"># already one component</span>
    if rank[ra] &lt; rank[rb]:
        ra, rb = rb, ra          <span class="cm"># shorter under taller</span>
    <span class="hi-y">parent[rb] = ra</span>
    rank[ra] += rank[ra] == rank[rb]

<span class="cm"># PROOF: rank keeps trees O(log n) tall; compression
# flattens them &rarr; amortized &alpha;(n) ~ O(1) per op.</span>`},
dia:()=>`<div class="av">
  <div class="ac live">0</div><div class="ac hot">2</div><div class="ac">5</div>
</div>
<div class="av-cap">before union(0,2): separate roots {0} and {2}</div>
<div class="av-gap"></div>

{phase:'pill-principle',phaseTxt:'Rule #3 — new implementation',title:'The harvest reads the forest three ways',desc:'The answer already sits in the forest; you just choose <em>when</em> to look. Three harvest moments, same structure: at <strong>query time</strong> &mdash; <code>connected(x,y) = (find(x)==find(y))</code>; at <strong>merge time</strong> &mdash; if the two roots are <em>already equal</em> before you union, this edge closed a cycle; and the <strong>root count</strong> &mdash; the number of distinct roots is the number of components. Placement is the whole game: read the cycle BEFORE the union, or the evidence is gone.',
code:{h:'The harvest — three moments, one forest',b:`<span class="cm"># 1) QUERY TIME:</span>
<span class="hi-g">connected = find(x) == find(y)</span>

if find(a) == find(b):

<span class="cm"># 3) ROOT COUNT:</span>
<span class="hi-g">components = sum(find(i) == i for i in range(n))</span>

<span class="cm"># One step too late (after a blind union) and the

{phase:'pill-solution',phaseTxt:'Integration',title:'Wire the three rules — Number of Provinces',desc:'The complete disjoint-set structure, then Number of Provinces falls out in three lines: union every friendship edge, then harvest the root count. The dynamic twist is free &mdash; each new edge is one near-O(1) union, and <code>count</code> is always current.',
code:{h:'provinces.py — final',b:`class DSU:
    def __init__(self, n):
        self.par = list(range(n))    <span class="cm"># INVARIANT: par[x]</span>
        self.rank = [0]*n            <span class="cm">#  chains to a root</span>
        self.count = n               <span class="cm"># live components</span>
    def find(self, x):
        while self.par[x] != x:
            self.par[x] = self.par[self.par[x]]  <span class="cm"># compress</span>
            x = self.par[x]
        return x
    def union(self, a, b):           <span class="cm"># MOVE</span>
        ra, rb = self.find(a), self.find(b)
        if ra == rb: return False    <span class="cm"># already joined</span>
        if self.rank[ra] &lt; self.rank[rb]: ra, rb = rb, ra
        self.par[rb] = ra
        self.rank[ra] += self.rank[ra] == self.rank[rb]
        self.count -= 1              <span class="cm"># one fewer component</span>
        return True

def provinces(M):
    d = DSU(len(M))
    for i in range(len(M)):
        for j in range(i+1, len(M)):
            if M[i][j]: d.union(i, j)     <span class="cm"># MOVE per edge</span>
    return <span class="hi-g">d.count</span>                  <span class="cm"># HARVEST: root count</span>`},

{phase:'pill-solution',phaseTxt:'Same rules, new body #1',title:'Redundant Connection — harvest at merge time',desc:'A tree of <code>n</code> nodes had exactly one extra edge added, forming a cycle; return that edge. Process edges in order and union each. The <strong>harvest moves to merge time</strong>: the first edge whose two endpoints <em>already share a root</em> is the redundant one &mdash; unioning them would close a cycle.',

            return [a, b]        <span class="cm">#  roots already equal &rarr; cycle</span>
    return []
<span class="cm"># union() returns False exactly when a, b were

{phase:'pill-solution',phaseTxt:'Same rules, new body #2',title:'Accounts Merge — union by shared email',desc:'Each account is a name plus a list of emails; two accounts belong to the same person iff they share any email. Merge them. The <strong>invariant now lives over emails</strong>: union every email of an account to that account\'s first email; then <strong>harvest by grouping</strong> each email under its root.',
code:{h:'accounts.py — union on a shared key',b:`def merge_accounts(accounts):
    parent, owner = {}, {}
    def find(x):                 <span class="cm"># dict-backed DSU</span>
        parent.setdefault(x, x)
        while parent[x] != x:
            parent[x] = parent[parent[x]]; x = parent[x]
        return x
    for name, *emails in accounts:
        for e in emails:
            owner[e] = name
            parent.setdefault(e, e)
            parent[find(e)] = find(emails[0])   <span class="cm"># MOVE: union</span>
    groups = collections.defaultdict(list)
    for e in owner:
        <span class="hi-g">groups[find(e)].append(e)</span>          <span class="cm"># HARVEST: group</span>
    return [[owner[r]] + sorted(v)
            for r, v in groups.items()]`},

{phase:'pill-solution',phaseTxt:'Same rules, new body #3',title:'Islands II — where DFS cannot follow',desc:'A grid starts all water; land cells are added one at a time by <code>addLand(r,c)</code>, and after each you must report the island count. This is the case DFS <em>cannot</em> match: edits arrive over time and merges accumulate. The <strong>move gains a birth step</strong> &mdash; a new land cell is its own island (<code>count += 1</code>), then unions with each existing land neighbor (<code>count -= 1</code> per successful merge).',
code:{h:'islands_ii.py — online connectivity',b:`def num_islands2(m, n, positions):
    d = DSU(m*n); d.count = 0
    land, res = set(), []
    for r, c in positions:
        if (r, c) in land:
            res.append(d.count); continue
        land.add((r, c))
        d.count += 1              <span class="cm"># MOVE: born as its own island</span>
        for dr, dc in ((1,0),(-1,0),(0,1),(0,-1)):
            nb = (r+dr, c+dc)
            if nb in land:
                d.union(r*n+c, nb[0]*n+nb[1])  <span class="cm"># merge &rarr; count--</span>
        <span class="hi-g">res.append(d.count)</span>        <span class="cm"># HARVEST: running count</span>
    return res`},

{phase:'pill-solution',phaseTxt:'Same rules, new body #4',title:'Kruskal\'s MST — Union-Find as the cycle guard',desc:'Build a minimum spanning tree: sort all edges by weight, then greedily take each edge <em>unless</em> it would form a cycle. Union-Find is the cycle guard &mdash; take an edge only when its endpoints are in <strong>different</strong> components; <code>union</code> both and add the weight. Stop at <code>n&minus;1</code> edges.',
code:{h:'kruskal.py — greedy + cycle guard',b:`def kruskal(n, edges):           <span class="cm"># edges: (w, u, v)</span>
    d = DSU(n)
    total, used = 0, 0
    for w, u, v in sorted(edges):        <span class="cm"># greedy by weight</span>
        <span class="hi-y">if d.union(u, v):</span>        <span class="cm"># MOVE: take iff no cycle</span>
            total += w           <span class="cm"># union() False &rarr; would loop</span>
            used += 1
            <span class="hi-g">if used == n - 1:</span>    <span class="cm"># HARVEST: tree complete</span>
                break
    return total`},

let cur=0;
const visited=new Set([0]);

function renderDots(){
  const d=document.getElementById('dots');
  d.innerHTML='';
  S.forEach((_,i)=>{
    const e=document.createElement('div');
    e.className='dot'+(i===cur?' active':(visited.has(i)?' visited':''));
    e.onclick=()=>go(i);
    d.appendChild(e);
  });
}

function go(n){
  if(n<0||n>=S.length)return;
  cur=n; visited.add(n);
  const s=S[n];
  document.getElementById('step-label').textContent=`Step ${n+1} of ${S.length}`;
  document.getElementById('prog').style.width=((n+1)/S.length*100)+'%';
  document.getElementById('pb').disabled=n===0;
  const nb=document.getElementById('nb');
  nb.disabled=n===S.length-1;
  nb.textContent=n===S.length-1?'Done':'Next →';

  let h=`<div class="s-content"><span class="pill ${s.phase}">${s.phaseTxt}</span><div class="s-title">${s.title}</div><div class="s-desc">${s.desc}</div>`;
  if(s.principle) h+=`<div class="principle-box"><div class="p-lbl">${s.principle.lbl}</div><div class="p-txt">${s.principle.txt}</div></div>`;
  if(s.code&&s.dia){
    h+=`<div class="two-panel"><div class="panel"><div class="panel-h">${s.code.h}</div><div class="panel-b">${s.code.b}</div></div><div class="panel"><div class="panel-h">Visualization</div><div style="padding:12px 10px">${s.dia()}</div></div></div>`;
  } else if(s.code){
    h+=`<div class="full-panel"><div class="panel-h">${s.code.h}</div><div class="panel-b">${s.code.b}</div></div>`;
  } else if(s.dia){
    h+=`<div style="margin-bottom:14px">${s.dia()}</div>`;
  }
  if(s.extra) h+=s.extra();
  if(s.callout) h+=`<div class="callout ${s.callout.type}">${s.callout.text}</div>`;
  h+=`</div>`;
  document.getElementById('sc').innerHTML=h;
  renderDots();
}

function toggleTheme(){
  const html=document.documentElement;
  html.setAttribute('data-theme', html.getAttribute('data-theme')==='dark'?'':'dark');
}

document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight') go(cur+1);
  if(e.key==='ArrowLeft') go(cur-1);
});

go(0);
