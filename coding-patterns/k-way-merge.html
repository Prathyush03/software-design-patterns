<style>

    --text-danger: #791f1f;

    --purple-50: #EEEDFE; --purple-100: #CECBF6; --purple-600: #534AB7; --purple-800: #3C3489; --purple-900: #26215C;
    --teal-50: #E1F5EE; --teal-600: #0F6E56; --teal-800: #085041;

    --bg-success: #1a3008;

    --text-tertiary: #7a786f;

  .rc-txt { padding: 8px 12px; font-size: 12.5px; color: var(--text-primary); line-height: 1.55; }
  .rc-txt code { font-family: var(--font-mono); font-size: 11.5px; background: var(--bg-secondary); padding: 1px 4px; border-radius: 3px; }

  .sum-wrap { border: 0.5px solid var(--border-tertiary); border-radius: var(--radius-sm); overflow: hidden; overflow-x: auto; margin-bottom: 14px; }
  .sum-tbl { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 600px; }
  .sum-tbl th { text-align: left; padding: 8px 10px; background: var(--bg-secondary); font-weight: 500; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-secondary); border-bottom: 0.5px solid var(--border-tertiary); }
  .sum-tbl td { padding: 8px 10px; border-bottom: 0.5px solid var(--border-tertiary); vertical-align: top; line-height: 1.5; color: var(--text-primary); }
  .sum-tbl tr:last-child td { border-bottom: none; }
  .sum-tbl td:first-child { font-weight: 500; white-space: nowrap; }
  .col-inv { color: var(--text-info) !important; }
  .col-mov { color: var(--text-warning) !important; }
  .col-har { color: var(--text-success) !important; }

  .callout { border-radius: 0; padding: 10px 14px; font-size: 13px; line-height: 1.6; border-left: 3px solid; background: var(--bg-secondary); }
  .callout-bad { border-left-color: var(--border-danger); color: var(--text-danger); }
  .callout-warn { border-left-color: var(--border-warning); color: var(--text-warning); }
  .callout-ok { border-left-color: var(--border-success); color: var(--text-success); }
  .callout-info { border-left-color: var(--border-info); color: var(--text-info); }
  .callout-purple { border-left-color: var(--purple-600); color: var(--purple-800); }

  .legend { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; font-size: 10px; color: var(--text-secondary); margin-top: 10px; }
  .legend-i { display: flex; align-items: center; gap: 4px; }
  .legend-sw { width: 14px; height: 9px; border-radius: 3px; }

  .bot-nav { display: flex; align-items: center; justify-content: space-between; gap: 12px; background: var(--bg-primary); border: 0.5px solid var(--border-tertiary); border-radius: var(--radius); padding: 14px 20px; }
  .bot-nav button { background: transparent; border: 0.5px solid var(--border-secondary); border-radius: var(--radius-sm); padding: 9px 22px; font-size: 13px; cursor: pointer; color: var(--text-primary); font-family: var(--font-body); font-weight: 500; transition: background 0.15s, transform 0.1s; }
  .bot-nav button:hover { background: var(--bg-secondary); }
  .bot-nav button:active { transform: scale(0.97); }
  .bot-nav button:disabled { opacity: 0.2; cursor: default; }
  .dots { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border-tertiary); cursor: pointer; transition: all 0.25s; }
  .dot.active { background: var(--text-info); width: 22px; border-radius: 4px; }

  .s-content { animation: fadeSlide 0.35s ease; }

  .kbd-hint { text-align: center; font-size: 11px; color: var(--text-tertiary); margin-top: 12px; }

<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>Chapter 7 — K-way Merge</h1>
      <p>Grokking Patterns, The Rules Way — same three rules, every implementation changes</p>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">Toggle dark mode</button>
  </div>

  <div class="top-bar">
    <span class="step-label" id="step-label"></span>
    <div class="prog-track"><div class="prog-fill" id="prog"></div></div>
  </div>

  <div class="card" id="sc"></div>

  <div class="bot-nav">
    <button id="pb" onclick="go(cur-1)">&larr; Back</button>
    <div class="dots" id="dots"></div>
    <button id="nb" onclick="go(cur+1)">Next &rarr;</button>
  </div>

  <div class="kbd-hint">Use <kbd>&larr;</kbd> <kbd>&rarr;</kbd> arrow keys to navigate</div>
</div>

<script>
function rulesCard(title, inv, mov, har, bad){
  return '<div class="rules-card"><div class="rc-h'+(bad?' rc-bad':'')+'">'+title+'</div>'
    +'<div class="rc-row"><div class="rc-tag t-inv">Invariant</div><div class="rc-txt">'+inv+'</div></div>'
    +'<div class="rc-row"><div class="rc-tag t-mov">Move</div><div class="rc-txt">'+mov+'</div></div>'
    +'<div class="rc-row"><div class="rc-tag t-har">Harvest</div><div class="rc-txt">'+har+'</div></div></div>';
}

const S=[
{phase:'pill-try',phaseTxt:"The Brief",title:"Merge k Sorted Linked Lists",desc:"A fresh shape of input: not one array but <strong>k separate lists, each already sorted</strong>. Given their <code>k</code> heads, weave them into one sorted list. The whole story is that gift phrase &mdash; <strong>already sorted</strong> &mdash; the inputs arrive in order, so the answer is a merge, not a fresh sort. Let <code>N</code> be the total node count.",
code:{h:'The problem',b:`lists = [
  1 &rarr; 4 &rarr; 7,        <span class="cm"># k = 3, each list sorted</span>
  2 &rarr; 5 &rarr; 8,
  3 &rarr; 6 &rarr; 9,
]

merge(lists) =
  1 &rarr; 2 &rarr; 3 &rarr; 4 &rarr; 5 &rarr; 6 &rarr; 7 &rarr; 8 &rarr; 9

<span class="cm"># N = total nodes across all k lists.</span>`},
dia:()=>`<div class="av"><div class="ac live">1</div><div class="ac">4</div><div class="ac">7</div></div>
<div class="av"><div class="ac live">2</div><div class="ac">5</div><div class="ac">8</div></div>
<div class="av"><div class="ac live">3</div><div class="ac">6</div><div class="ac">9</div></div>
<div class="av-cap">three sorted lists (rows). The blue cells are the k heads &mdash; the <b>frontier</b>,<br>the only candidates for the next element of the output.</div>`,
callout:{type:'callout-ok',text:"Three sorted streams, one sorted output. Hold on to the gift &mdash; each list is already ordered &mdash; it is the whole reason we will never re-sort a single element."}
},
{phase:'pill-try',phaseTxt:"Attempt #1",title:"Brute force — rescan all k heads for the min",desc:"The obvious in-place merge: at every step look at the current head of each of the k lists, pick the smallest, emit it, advance that one list. Genuinely correct, and it never re-sorts &mdash; it respects the gift. But finding the min means a fresh <strong>linear scan of all k heads, every single step</strong>.",
code:{h:'merge_k_lists.py — the naive scan',b:`def merge_k_lists(lists):
    heads = lists[:]              <span class="cm"># current head of each list</span>
    out = tail = ListNode(0)
    while any(heads):
        m = min(                  <span class="cm"># SCAN all k heads</span>
            (i for i in range(len(heads)) if heads[i]),
            key=lambda i: heads[i].val)
        tail.next = heads[m]      <span class="cm"># emit the min</span>
        tail = heads[m]
        heads[m] = heads[m].next  <span class="cm"># advance that one list</span>
    return out.next

<span class="cm"># N elements &times; O(k) scan each = O(N&times;k).
# (An even lazier idea, dump-all-then-sort,
#  is O(N log N) and throws the gift away.)</span>`},
dia:()=>`<div class="av"><div class="ac live">1</div><div class="ac">4</div><div class="ac">7</div></div>
<div class="av"><div class="ac live">2</div><div class="ac">5</div><div class="ac">8</div></div>
<div class="av"><div class="ac live">3</div><div class="ac">6</div><div class="ac">9</div></div>
<div class="av-cap">step 1: scan all 3 heads {1,2,3} &rarr; min is <code>1</code>. emit it, advance list A.</div>
<div class="av-gap"></div>
<div class="av"><div class="ac dead">1</div><div class="ac live">4</div><div class="ac">7</div></div>
<div class="av"><div class="ac live">2</div><div class="ac">5</div><div class="ac">8</div></div>
<div class="av"><div class="ac live">3</div><div class="ac">6</div><div class="ac">9</div></div>
<div class="av-cap">step 2: scan the 3 heads {4,2,3} AGAIN &rarr; min is <code>2</code>.<br>every step re-scans all k heads &mdash; O(k) wasted work per element.</div>`,
callout:{type:'callout-ok',text:"Correct, and it honors the sorted gift. But with N = 1e5 nodes spread over k = 1e4 lists, that inner scan is ~1e9 comparisons. The min-finding is the bottleneck &mdash; and it is doing it the slow way."}
},
{phase:'pill-ohno',phaseTxt:"Diagnose!",title:"Which rule is the bottleneck?",desc:"Chapters 1&ndash;3 handed us three rules. This brute force is not <em>wrong</em>, and it is not <em>fat</em> in memory &mdash; it is <strong>slow</strong>, in an unusual way: it already found the right invariant, then implemented the move badly. Audit it.",
code:null,
dia:null,
extra:()=>rulesCard('Rule audit — brute force vs. the three rules',
 '<span style="color:var(--text-success);font-weight:500">&#10003; SURVIVES.</span> "The k current heads are the frontier, and their minimum is the next output" is exactly the right invariant &mdash; the brute force <em>found</em> it. It just does not store the frontier in a form that surrenders the min cheaply.',
 '<span class="viol">&#10007; VIOLATED (time).</span> The move re-derives the minimum from scratch each step &mdash; an O(k) linear scan of all k heads &mdash; giving O(N&times;k). It discards everything it learned about the ordering on the previous step.',
 '<span style="color:var(--text-warning);font-weight:500">~ SURVIVES.</span> Each emitted min lands in correct sorted position &mdash; the harvest is right, but it is throttled to the speed of that O(k) scan.',
 true),
callout:{type:'callout-bad',text:"The invariant is already correct; the frontier idea is sound. The MOVE is the culprit &mdash; an O(k) rescan where an O(log k) lookup would do. We do not need a new idea, we need a leaner implementation of the same move: a structure that hands back the min for free."}
},
{phase:'pill-principle',phaseTxt:"Rule #1 — new implementation",title:"The invariant: a heap that holds exactly the frontier",desc:"Keep the frontier &mdash; the current head of every source &mdash; inside a <strong>min-heap</strong>. Maintain one fact after every step: <strong>the heap contains exactly one live head per unexhausted source, so its root is the globally smallest unconsumed element.</strong> That is the whole invariant, and the heap stays size &le; k.",
code:{h:'The promise — a heap of heads',b:`import heapq
heap = []
for i, node in enumerate(lists):
    if node:
        heapq.heappush(heap, (node.val, i, node))

<span class="hi-b"># INVARIANT — true after every step:
#  the heap holds one head per live source,
#  so heap[0] is the GLOBAL minimum of all
#  unconsumed elements. Size &le; k.</span>`},
dia:()=>`<div class="av"><div class="ac live">1</div><div class="ac">4</div><div class="ac">7</div></div>
<div class="av"><div class="ac live">2</div><div class="ac">5</div><div class="ac">8</div></div>
<div class="av"><div class="ac live">3</div><div class="ac">6</div><div class="ac">9</div></div>
<div class="av-cap">min-heap of the frontier &darr;</div>
<div class="av"><div class="ac live">1</div><div class="ac live">2</div><div class="ac live">3</div></div>
<div class="av-cap">the heap holds exactly the k heads {1,2,3}; its root <code>1</code> is the<br>global minimum. Size &le; k &mdash; never the whole N.</div>`,
callout:{type:'callout-info',text:"Same rule as Chapters 1&ndash;3: name the property that survives every step. What changed is only its container &mdash; from a pair of pointers to a heap of k frontiers."},
principle:{lbl:"Rule #1 — Name the invariant (reused)",txt:"Same rule, new implementation: the invariant is a min-heap holding the frontier of k sorted sources; its root is always the global min. In Two Pointers the invariant described the discarded outside; in Sliding Window the living inside a window; here it is the k-wide frontier of sorted streams, compressed into a heap of size k."}
},
{phase:'pill-principle',phaseTxt:"Rule #2 — new implementation",title:"The move: pop the min, push its successor",desc:"One step = pop the root (the current global min) and push the next element from <strong>that same source</strong>. Exactly one element is consumed per step, and the heap stays size &le; k. Why it is bounded: each of the N elements is pushed once and popped once, and every heap operation is O(log k).",
code:{h:'The move — pop then refill',b:`val, i, node = heapq.heappop(heap)      <span class="cm"># pop the min</span>
if node.next:                           <span class="cm"># the SAME source advances</span>
    heapq.heappush(heap, (node.next.val, i, node.next))

<span class="cm"># PROOF: N elements, each pushed & popped
# once, each op O(log k)  &rarr;  O(N log k).

code:{h:'merge_k_lists.py — final',b:`import heapq

def merge_k_lists(lists):

code:{h:'kth_smallest.py — harvest truncates',b:`def kth_smallest(matrix, k):
    n = len(matrix)
    heap = [(matrix[r][0], r, 0) for r in range(n)]   <span class="cm"># frontier: col 0</span>
    heapq.heapify(heap)
    for _ in range(k):                     <span class="cm"># MOVE: pop exactly k times</span>
        val, r, c = heapq.heappop(heap)
        if c + 1 &lt; n:                       <span class="cm"># push right neighbor, same row</span>
            heapq.heappush(heap, (matrix[r][c+1], r, c+1))
    return <span class="hi-g">val</span>                             <span class="cm"># HARVEST: the k-th pop</span>

<span class="cm"># O(k log n) time.</span>`},

{phase:'pill-solution',phaseTxt:"Same rules, new body #2",title:"Smallest Range Covering Elements from k Lists",desc:"Find the shortest range <code>[lo, hi]</code> that contains at least one number from each of the k sorted lists. Keep the frontier in the heap as always &mdash; but the <strong>invariant gains a clause</strong>: also track the current <em>max</em> among the heap's elements. Since the heap always holds one element per list, the range <code>[root, max]</code> already covers all k lists.",
code:{h:'smallest_range.py — invariant + a max',b:`def smallest_range(lists):
    heap = [(row[0], i, 0) for i, row in enumerate(lists)]
    heapq.heapify(heap)
    <span class="hi-b">cur_max = max(row[0] for row in lists)</span>   <span class="cm"># INVARIANT gains: max</span>
    best = (-10**9, 10**9)
    while True:
        lo, i, j = heapq.heappop(heap)         <span class="cm"># MOVE</span>
        if <span class="hi-g">cur_max - lo &lt; best[1] - best[0]</span>:   <span class="cm"># HARVEST: candidate</span>
            best = (lo, cur_max)
        if j + 1 == len(lists[i]):             <span class="cm"># a source ran dry &rarr; stop</span>

let cur=0;
const visited=new Set([0]);

function renderDots(){
  const d=document.getElementById('dots');
  d.innerHTML='';
  S.forEach((_,i)=>{
    const e=document.createElement('div');
    e.className='dot'+(i===cur?' active':(visited.has(i)?' visited':''));
    e.onclick=()=>go(i);
    d.appendChild(e);
  });
}

function go(n){
  if(n<0||n>=S.length)return;
  cur=n; visited.add(n);
  const s=S[n];
  document.getElementById('step-label').textContent=`Step ${n+1} of ${S.length}`;
  document.getElementById('prog').style.width=((n+1)/S.length*100)+'%';
  document.getElementById('pb').disabled=n===0;
  const nb=document.getElementById('nb');
  nb.disabled=n===S.length-1;
  nb.textContent=n===S.length-1?'Done':'Next →';

  let h=`<div class="s-content"><span class="pill ${s.phase}">${s.phaseTxt}</span><div class="s-title">${s.title}</div><div class="s-desc">${s.desc}</div>`;
  if(s.principle) h+=`<div class="principle-box"><div class="p-lbl">${s.principle.lbl}</div><div class="p-txt">${s.principle.txt}</div></div>`;
  if(s.code&&s.dia){
    h+=`<div class="two-panel"><div class="panel"><div class="panel-h">${s.code.h}</div><div class="panel-b">${s.code.b}</div></div><div class="panel"><div class="panel-h">Visualization</div><div style="padding:12px 10px">${s.dia()}</div></div></div>`;
  } else if(s.code){
    h+=`<div class="full-panel"><div class="panel-h">${s.code.h}</div><div class="panel-b">${s.code.b}</div></div>`;
  } else if(s.dia){
    h+=`<div style="margin-bottom:14px">${s.dia()}</div>`;
  }
  if(s.extra) h+=s.extra();
  if(s.callout) h+=`<div class="callout ${s.callout.type}">${s.callout.text}</div>`;
  h+=`</div>`;
  document.getElementById('sc').innerHTML=h;
  renderDots();
}

function toggleTheme(){
  const html=document.documentElement;
  html.setAttribute('data-theme', html.getAttribute('data-theme')==='dark'?'':'dark');
}

document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight') go(cur+1);
  if(e.key==='ArrowLeft') go(cur-1);
});

go(0);
</script>
