<head>

<title>Chapter 12 — Backtracking | Grokking Patterns, The Rules Way</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f4f0;
    --bg-tertiary: #eceae4;
    --bg-info: #e6f1fb;
    --bg-danger: #fcebeb;
    --bg-success: #eaf3de;
    --bg-warning: #faeeda;
    --text-primary: #1a1a18;
    --text-secondary: #6b6a65;
    --text-tertiary: #9c9a92;
    --text-info: #0c447c;
    --text-danger: #791f1f;
    --text-success: #27500a;
    --text-warning: #633806;
    --border-primary: rgba(0,0,0,0.4);
    --border-secondary: rgba(0,0,0,0.2);
    --border-tertiary: rgba(0,0,0,0.1);
    --border-info: #85b7eb;
    --border-danger: #f09595;
    --border-success: #97c459;
    --border-warning: #eF9F27;
    --purple-50: #EEEDFE; --purple-100: #CECBF6; --purple-600: #534AB7; --purple-800: #3C3489; --purple-900: #26215C;
    --teal-50: #E1F5EE; --teal-600: #0F6E56; --teal-800: #085041;
    --coral-50: #FAECE7; --coral-600: #993C1D; --coral-800: #712B13;
    --font-body: 'DM Sans', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    --radius: 10px;
    --radius-sm: 6px;
  }

  [data-theme="dark"] {
    --bg-primary: #1c1c1a;
    --bg-secondary: #2a2a27;
    --bg-tertiary: #353532;
    --bg-info: #0c2d4a;
    --bg-danger: #3d1515;
    --bg-success: #1a3008;
    --bg-warning: #3d2804;
    --text-primary: #e8e6df;
    --text-secondary: #a5a39b;
    --text-tertiary: #7a786f;
    --text-info: #85b7eb;
    --text-danger: #f09595;
    --text-success: #97c459;
    --text-warning: #fac775;
    --border-primary: rgba(255,255,255,0.35);
    --border-secondary: rgba(255,255,255,0.18);
    --border-tertiary: rgba(255,255,255,0.08);
    --border-info: #378add;
    --border-danger: #e24b4a;
    --border-success: #639922;
    --border-warning: #ba7517;
    --purple-50: #2a2554; --purple-100: #3C3489; --purple-600: #AFA9EC; --purple-800: #CECBF6; --purple-900: #EEEDFE;
    --teal-50: #0a3528; --teal-600: #5DCAA5; --teal-800: #9FE1CB;
    --coral-50: #3a1a0e; --coral-600: #F0997B; --coral-800: #F5C4B3;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body { font-family: var(--font-body); background: var(--bg-tertiary); color: var(--text-primary); line-height: 1.6; min-height: 100vh; transition: background 0.3s, color 0.3s; }
  .container { max-width: 880px; margin: 0 auto; padding: 24px 20px 40px; }

  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; gap: 12px; flex-wrap: wrap; }
  .header-left h1 { font-size: 20px; font-weight: 500; letter-spacing: -0.3px; }
  .header-left p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  .theme-toggle { background: var(--bg-secondary); border: 0.5px solid var(--border-tertiary); border-radius: 20px; padding: 6px 14px; font-size: 13px; cursor: pointer; color: var(--text-secondary); font-family: var(--font-body); transition: background 0.2s; }
  .theme-toggle:hover { background: var(--bg-tertiary); }

  .top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .step-label { font-size: 13px; color: var(--text-secondary); min-width: 85px; font-weight: 500; }
  .prog-track { flex: 1; height: 4px; background: var(--bg-secondary); border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--text-info); border-radius: 2px; transition: width 0.4s ease; }

  .card { background: var(--bg-primary); border: 0.5px solid var(--border-tertiary); border-radius: var(--radius); padding: 28px 28px 20px; margin-bottom: 16px; transition: background 0.3s, border-color 0.3s; }

  .pill { display: inline-block; font-size: 11px; padding: 3px 12px; border-radius: 20px; font-weight: 500; margin-bottom: 10px; letter-spacing: 0.3px; text-transform: uppercase; }
  .pill-try { background: var(--bg-secondary); color: var(--text-secondary); }
  .pill-ohno { background: var(--bg-danger); color: var(--text-danger); }
  .pill-fix { background: var(--bg-warning); color: var(--text-warning); }
  .pill-principle { background: var(--bg-info); color: var(--text-info); }
  .pill-solution { background: var(--bg-success); color: var(--text-success); }
  .pill-pattern { background: var(--purple-50); color: var(--purple-800); }

  .s-title { font-size: 19px; font-weight: 500; margin-bottom: 6px; letter-spacing: -0.3px; }
  .s-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.65; margin-bottom: 16px; }
  .s-desc code { font-family: var(--font-mono); font-size: 12.5px; background: var(--bg-secondary); padding: 1px 5px; border-radius: 4px; }

  .principle-box { border: 0.5px solid var(--border-info); border-radius: var(--radius-sm); padding: 12px 16px; margin-bottom: 18px; background: var(--bg-info); }
  .principle-box .p-lbl { font-size: 11px; font-weight: 500; color: var(--text-info); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
  .principle-box .p-txt { font-size: 13px; color: var(--text-info); line-height: 1.55; }

  .two-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  @media (max-width: 680px) { .two-panel { grid-template-columns: 1fr; } }

  .panel { border: 0.5px solid var(--border-tertiary); border-radius: var(--radius-sm); overflow: hidden; }
  .panel-h { padding: 7px 14px; font-size: 11px; font-weight: 500; background: var(--bg-secondary); color: var(--text-secondary); border-bottom: 0.5px solid var(--border-tertiary); text-transform: uppercase; letter-spacing: 0.4px; }
  .panel-b { padding: 14px 16px; font-family: var(--font-mono); font-size: 12px; line-height: 1.7; white-space: pre; overflow-x: auto; color: var(--text-primary); }
  .full-panel { border: 0.5px solid var(--border-tertiary); border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 14px; }
  .full-panel .panel-h { padding: 7px 14px; font-size: 11px; font-weight: 500; background: var(--bg-secondary); color: var(--text-secondary); border-bottom: 0.5px solid var(--border-tertiary); text-transform: uppercase; letter-spacing: 0.4px; }
  .full-panel .panel-b { padding: 14px 16px; font-family: var(--font-mono); font-size: 12px; line-height: 1.7; white-space: pre; overflow-x: auto; color: var(--text-primary); }

  .cm { color: var(--text-tertiary); }
  .hi-r { background: var(--bg-danger); padding: 1px 4px; border-radius: 3px; }
  .hi-y { background: var(--bg-warning); padding: 1px 4px; border-radius: 3px; }
  .hi-g { background: var(--bg-success); padding: 1px 4px; border-radius: 3px; }
  .hi-b { background: var(--bg-info); padding: 1px 4px; border-radius: 3px; }

  .av { display: flex; gap: 3px; justify-content: center; flex-wrap: wrap; }
  .ac { min-width: 32px; padding: 6px 4px; text-align: center; border: 0.5px solid var(--border-secondary); border-radius: 5px; font-family: var(--font-mono); font-size: 12px; background: var(--bg-primary); }
  .ac.dead { opacity: 0.35; background: var(--bg-secondary); }
  .ac.live { background: var(--bg-info); border-color: var(--border-info); color: var(--text-info); }
  .ac.hot  { background: var(--bg-warning); border-color: var(--border-warning); color: var(--text-warning); }
  .ac.win  { background: var(--bg-success); border-color: var(--border-success); color: var(--text-success); }
  .ac.bad2 { background: var(--bg-danger); border-color: var(--border-danger); color: var(--text-danger); }
  .ptr-row { display: flex; gap: 3px; justify-content: center; margin-top: 3px; flex-wrap: wrap; }
  .ptr { min-width: 32px; text-align: center; font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); }
  .ptr b { color: var(--text-info); font-weight: 500; }
  .av-cap { text-align: center; font-size: 10.5px; color: var(--text-tertiary); margin-top: 8px; line-height: 1.5; }
  .av-gap { height: 12px; }

  .rules-card { border: 0.5px solid var(--border-tertiary); border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 14px; }
  .rules-card .rc-h { padding: 7px 14px; font-size: 11px; font-weight: 500; background: var(--purple-50); color: var(--purple-800); text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 0.5px solid var(--border-tertiary); }
  .rules-card .rc-h.rc-bad { background: var(--bg-danger); color: var(--text-danger); }
  .rc-row { display: grid; grid-template-columns: 96px 1fr; border-bottom: 0.5px solid var(--border-tertiary); }
  .rc-row:last-child { border-bottom: none; }
  .rc-tag { padding: 8px 10px; font-size: 10px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; display: flex; align-items: center; }
  .rc-tag.t-inv { background: var(--bg-info); color: var(--text-info); }
  .rc-tag.t-mov { background: var(--bg-warning); color: var(--text-warning); }
  .rc-tag.t-har { background: var(--bg-success); color: var(--text-success); }
  .rc-txt { padding: 8px 12px; font-size: 12.5px; color: var(--text-primary); line-height: 1.55; }
  .rc-txt code { font-family: var(--font-mono); font-size: 11.5px; background: var(--bg-secondary); padding: 1px 4px; border-radius: 3px; }
  .rc-txt .viol { color: var(--text-danger); font-weight: 500; }

  .sum-wrap { border: 0.5px solid var(--border-tertiary); border-radius: var(--radius-sm); overflow: hidden; overflow-x: auto; margin-bottom: 14px; }
  .sum-tbl { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 600px; }
  .sum-tbl th { text-align: left; padding: 8px 10px; background: var(--bg-secondary); font-weight: 500; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-secondary); border-bottom: 0.5px solid var(--border-tertiary); }
  .sum-tbl td { padding: 8px 10px; border-bottom: 0.5px solid var(--border-tertiary); vertical-align: top; line-height: 1.5; color: var(--text-primary); }
  .sum-tbl tr:last-child td { border-bottom: none; }
  .sum-tbl td:first-child { font-weight: 500; white-space: nowrap; }
  .col-inv { color: var(--text-info) !important; }
  .col-mov { color: var(--text-warning) !important; }
  .col-har { color: var(--text-success) !important; }

  .callout { border-radius: 0; padding: 10px 14px; font-size: 13px; line-height: 1.6; border-left: 3px solid; background: var(--bg-secondary); }
  .callout-bad { border-left-color: var(--border-danger); color: var(--text-danger); }
  .callout-warn { border-left-color: var(--border-warning); color: var(--text-warning); }
  .callout-ok { border-left-color: var(--border-success); color: var(--text-success); }
  .callout-info { border-left-color: var(--border-info); color: var(--text-info); }
  .callout-purple { border-left-color: var(--purple-600); color: var(--purple-800); }

  .legend { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; font-size: 10px; color: var(--text-secondary); margin-top: 10px; }
  .legend-i { display: flex; align-items: center; gap: 4px; }
  .legend-sw { width: 14px; height: 9px; border-radius: 3px; }

  .bot-nav { display: flex; align-items: center; justify-content: space-between; gap: 12px; background: var(--bg-primary); border: 0.5px solid var(--border-tertiary); border-radius: var(--radius); padding: 14px 20px; }
  .bot-nav button { background: transparent; border: 0.5px solid var(--border-secondary); border-radius: var(--radius-sm); padding: 9px 22px; font-size: 13px; cursor: pointer; color: var(--text-primary); font-family: var(--font-body); font-weight: 500; transition: background 0.15s, transform 0.1s; }
  .bot-nav button:hover { background: var(--bg-secondary); }
  .bot-nav button:active { transform: scale(0.97); }
  .bot-nav button:disabled { opacity: 0.2; cursor: default; }
  .dots { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border-tertiary); cursor: pointer; transition: all 0.25s; }
  .dot.active { background: var(--text-info); width: 22px; border-radius: 4px; }
  .dot.visited { background: var(--border-secondary); }

  .s-content { animation: fadeSlide 0.35s ease; }
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .kbd-hint { text-align: center; font-size: 11px; color: var(--text-tertiary); margin-top: 12px; }
  .kbd-hint kbd { font-family: var(--font-mono); background: var(--bg-secondary); padding: 1px 6px; border-radius: 4px; border: 0.5px solid var(--border-tertiary); font-size: 11px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>Chapter 12 — Backtracking</h1>
      <p>Grokking Patterns, The Rules Way — same three rules, every implementation changes</p>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">Toggle dark mode</button>
  </div>

  <div class="top-bar">
    <span class="step-label" id="step-label"></span>
    <div class="prog-track"><div class="prog-fill" id="prog"></div></div>
  </div>

  <div class="card" id="sc"></div>

  <div class="bot-nav">
    <button id="pb" onclick="go(cur-1)">&larr; Back</button>
    <div class="dots" id="dots"></div>
    <button id="nb" onclick="go(cur+1)">Next &rarr;</button>
  </div>

  <div class="kbd-hint">Use <kbd>&larr;</kbd> <kbd>&rarr;</kbd> arrow keys to navigate</div>
</div>

<script>
function rulesCard(title, inv, mov, har, bad){
  return '<div class="rules-card"><div class="rc-h'+(bad?' rc-bad':'')+'">'+title+'</div>'
    +'<div class="rc-row"><div class="rc-tag t-inv">Invariant</div><div class="rc-txt">'+inv+'</div></div>'
    +'<div class="rc-row"><div class="rc-tag t-mov">Move</div><div class="rc-txt">'+mov+'</div></div>'
    +'<div class="rc-row"><div class="rc-tag t-har">Harvest</div><div class="rc-txt">'+har+'</div></div></div>';
}

const S=[
{phase:'pill-try',phaseTxt:'The Brief',title:'N-Queens',desc:'A new shape of problem entirely: place <code>n</code> queens on an <code>n &times; n</code> board so that <strong>no two share a row, column, or diagonal</strong>, and return <strong>every distinct arrangement</strong>. Not one solution &mdash; <em>all</em> of them. The saving grace hidden in the constraints: <strong>n stays small</strong> (often &le; 12), so an exponential search is actually affordable.',
code:{h:'The problem',b:`board (n=4),  Q = queen,  . = empty

  . Q . .      a valid arrangement:
  . . . Q      no two queens attack
  Q . . .      along a row, a column,
  . . Q .      or either diagonal.

solve(4)  &rarr;  2 distinct solutions
solve(8)  &rarr;  92
solve(12) &rarr;  14200`},
dia:()=>`<div class="av"><div class="ac">.</div><div class="ac win">Q</div><div class="ac">.</div><div class="ac">.</div></div>
<div class="av"><div class="ac">.</div><div class="ac">.</div><div class="ac">.</div><div class="ac win">Q</div></div>
<div class="av"><div class="ac win">Q</div><div class="ac">.</div><div class="ac">.</div><div class="ac">.</div></div>
<div class="av"><div class="ac">.</div><div class="ac">.</div><div class="ac win">Q</div><div class="ac">.</div></div>
<div class="av-cap">one legal 4-queens board: columns <code>[1, 3, 0, 2]</code> &mdash; every queen safe.<br>We must enumerate <b>all</b> such boards, not merely find one.</div>`,
callout:{type:'callout-info',text:'Two signals scream backtracking: "return ALL arrangements" and heavy geometric constraints on a small board. Hold both &mdash; they are the whole recognition story.'}
},
{phase:'pill-try',phaseTxt:'Attempt #1',title:'Brute force &mdash; enumerate every placement, filter at the end',desc:'The literal reading: a board is just <code>n</code> queens dropped onto <code>n&sup2;</code> squares. So generate <strong>every</strong> way to choose <code>n</code> squares, build the whole board, and keep the ones that happen to be legal. Correct, and dead simple.',
code:{h:'n_queens_brute.py',b:`from itertools import combinations

def n_queens_brute(n):
    sols = []
    for combo in combinations(range(n*n), n):   <span class="cm"># choose n of n&sup2;</span>
        qs = [(c//n, c%n) for c in combo]
        if legal(qs):            <span class="cm"># checked ONLY at the end</span>
            sols.append(qs)
    return sols

<span class="cm"># n=8 &rarr; C(64,8) ~ 4.4e9 candidate boards, each
# built in full before a single legality test.
# Scale n up and it is astronomically hopeless.</span>`},
dia:()=>`<div class="av"><div class="ac bad2">Q</div><div class="ac bad2">Q</div><div class="ac">.</div><div class="ac">.</div></div>
<div class="av"><div class="ac">.</div><div class="ac">.</div><div class="ac">.</div><div class="ac">.</div></div>
<div class="av-cap">a candidate the brute force still builds in full: two queens in the same row,<br>attacking &mdash; obviously dead, yet judged only at the finished leaf.</div>
<div class="av-gap"></div>
<div class="av-cap">of C(64,8) &asymp; 4.4 billion boards, the overwhelming majority are<br>illegal by the <b>second</b> queen &mdash; but we never look until the end.</div>`,
callout:{type:'callout-ok',text:'It is genuinely correct. But it commits the cardinal sin: it builds billions of boards that were already doomed after two queens, and judges them only at the very end.'}
},
{phase:'pill-ohno',phaseTxt:'Diagnose!',title:'Which rule is missing?',desc:'The brute force is not subtly slow &mdash; it is <strong>exponentially wasteful</strong>. Audit it against the three rules from earlier chapters and the culprit is unmistakable: it maintains <em>no</em> invariant during construction, so it can never prune.',
code:null,
dia:null,
extra:()=>rulesCard('Rule audit &mdash; brute force vs. the three rules',
 '<span class="viol">&#10007; VIOLATED.</span> Nothing is kept true DURING construction. Legality is tested only at the finished leaf, so the builder cheerfully places queen 2 attacking queen 1 and carries on. With no "true after every step" property, there is nothing to prune on.',
 '<span style="color:var(--text-warning);font-weight:500">~ WEAK.</span> "Drop a queen on any free square" is a step, but it is decoupled from legality and has no undo. It descends into billions of already-dead boards and rebuilds the same doomed prefixes again and again.',
 '<span style="color:var(--text-warning);font-weight:500">~ SURVIVES.</span> "Filter the legal boards" is correct &mdash; but it fires only after all C(n&sup2;,n) boards are fully built. The right answer, harvested far too late to help.',
 true),
callout:{type:'callout-bad',text:'The rules did not change. The brute force simply refuses to maintain an invariant while it builds, so it cannot prune. We need a new IMPLEMENTATION of the same three rules, not a new idea.'}
},
{phase:'pill-principle',phaseTxt:'Rule #1 &mdash; new implementation',title:'The invariant is a legal partial solution',desc:'Stop building whole boards blindly. Grow the answer <strong>one queen at a time</strong> and maintain a single fact: <strong>every queen placed so far is mutually non-attacking</strong>. The path is a legal <em>partial</em> solution at all times &mdash; the instant a placement would break that, refuse to descend.',
code:{h:'The promise &mdash; grow a legal prefix',b:`path = []          <span class="cm"># queens placed so far, row by row</span>

<span class="hi-b"># INVARIANT &mdash; true after every step:
#   every queen in the path is mutually
#   non-attacking. The path is ALWAYS a
#   legal PARTIAL solution.</span>

<span class="cm"># The moment adding a queen would break this,
# we do NOT recurse &mdash; we prune. Illegal
# prefixes are never even built. O(1) to test
# with column / diagonal / anti-diagonal sets.</span>`},
dia:()=>`<div class="av"><div class="ac">.</div><div class="ac live">Q</div><div class="ac">.</div><div class="ac">.</div></div>
<div class="av"><div class="ac">.</div><div class="ac">.</div><div class="ac">.</div><div class="ac live">Q</div></div>
<div class="av-cap">legal partial: (0,1) and (1,3) do not attack &mdash; invariant holds, descend.</div>
<div class="av-gap"></div>
<div class="av"><div class="ac">.</div><div class="ac live">Q</div><div class="ac">.</div><div class="ac">.</div></div>
<div class="av"><div class="ac">.</div><div class="ac">.</div><div class="ac bad2">Q</div><div class="ac">.</div></div>
<div class="av-cap">illegal: (1,2) attacks (0,1) on the diagonal &rarr; invariant would break &rarr; never placed.</div>`,
callout:{type:'callout-info',text:'Same Rule #1 as ever: name the property that survives every step. In Two Pointers it described a REGION of the array; here it describes a growing PATH in a decision tree &mdash; and every prefix of that path must be legal.'},
principle:{lbl:'Rule #1 &mdash; Name the invariant (reused)',txt:'Same rule, new implementation: the invariant is no longer a window or a ratio &mdash; it is "the current path is a legal partial solution." Legality is enforced at every step, so whole subtrees of doomed boards are pruned before they are ever built.'}
},
{phase:'pill-principle',phaseTxt:'Rule #2 &mdash; new implementation',title:'The move: choose &rarr; explore &rarr; UNCHOOSE',desc:'One row per level. For the next row, try each safe column: <strong>choose</strong> it, <strong>explore</strong> the rest of the board recursively, then <strong>unchoose</strong> it to free the row for the next column. The undo is deliberate &mdash; irreversibility does not live in the placement, it lives in the <strong>enumeration order</strong>.',
code:{h:'The move &mdash; choose / explore / unchoose',b:`def place(row):
    for col in range(n):        <span class="cm"># fixed order: columns L &rarr; R</span>
        if safe(row, col):      <span class="cm"># keeps the invariant</span>
            <span class="hi-y">add(row, col)           # CHOOSE
            place(row + 1)          # EXPLORE
            remove(row, col)        # UNCHOOSE</span>

<span class="cm"># PROOF: depth is exactly n (one row per level)
# and columns are tried in a fixed order, so no
# (row, col) state is ever revisited. Each undo
# restores the invariant for the next sibling.
# Work = size of the PRUNED tree, never n^n.</span>`},

{phase:'pill-solution',phaseTxt:'Integration',title:'Wire the three rules together',desc:'The complete N-Queens solver: grow a legal path (invariant), choose / explore / unchoose per column (move), deep-copy at the goal (harvest). The exponential brute force collapses to a search that prunes the instant a queen is unsafe.',
code:{h:'solve_n_queens.py &mdash; final',b:`def solve_n_queens(n):
    cols, diag, anti = set(), set(), set()
    board, sols = [], []
    def place(row):
        if row == n:
            <span class="hi-g">sols.append(board[:])</span>            <span class="cm"># HARVEST</span>

        for col in range(n):
            <span class="hi-b">if col in cols or row-col in diag or row+col in anti:

            cols.add(col); diag.add(row-col); anti.add(row+col)
            <span class="hi-y">board.append(col)                    # CHOOSE

{phase:'pill-solution',phaseTxt:'Same rules, new body #1',title:'Word Search &mdash; the move mutates the grid in place',desc:'Given a grid of letters and a word, decide whether the word can be traced through <strong>4-directionally adjacent</strong> cells without reusing a cell. Same three rules &mdash; but now the <strong>move marks the cell in the board itself</strong>, and unmarks it on the way out. No separate visited set.',
code:{h:'exist.py',b:`def exist(board, word):
    R, C = len(board), len(board[0])
    def dfs(r, c, i):
        if i == len(word):                <span class="cm"># HARVEST: whole word matched</span>
            return True
        if not (0 &lt;= r &lt; R and 0 &lt;= c &lt; C) or board[r][c] != word[i]:
            return False                  <span class="cm"># INVARIANT: path spells a prefix</span>
        <span class="hi-y">board[r][c] = '#'                 # CHOOSE: mark in place</span>
        found = (dfs(r+1,c,i+1) or dfs(r-1,c,i+1)
                 or dfs(r,c+1,i+1) or dfs(r,c-1,i+1))
        <span class="hi-y">board[r][c] = word[i]             # UNCHOOSE: restore the cell</span>
        return found
    return any(dfs(r, c, 0) for r in range(R) for c in range(C))`},

{phase:'pill-solution',phaseTxt:'Same rules, new body #2',title:'Combination Sum &mdash; prune on remaining target',desc:'Given distinct positive <code>nums</code> and a <code>target</code>, return every combination that sums to it (a number may be reused). Two new twists, both in familiar rules: the invariant gains a <strong>remaining &ge; 0</strong> prune, and the move carries a <strong>start index</strong> so combinations are built in order &mdash; which is what stops the same set being counted twice.',
code:{h:'combination_sum.py',b:`def combination_sum(nums, target):
    nums.sort()
    path, res = [], []
    def build(start, remain):
        if remain == 0:
            <span class="hi-g">res.append(path[:])</span>          <span class="cm"># HARVEST: deep copy</span>
            return
        for i in range(start, len(nums)):
            <span class="hi-b">if nums[i] &gt; remain:
                break</span>                     <span class="cm"># INVARIANT: remaining stays &ge; 0</span>
            <span class="hi-y">path.append(nums[i])            # CHOOSE
            build(i, remain - nums[i])      # EXPLORE (i, not i+1 &rarr; reuse)
            path.pop()</span>                     <span class="cm"># UNCHOOSE</span>
    build(0, target)
    return res

<span class="cm"># start index &rarr; nondecreasing picks &rarr; each
# combination generated exactly ONCE (no perms).</span>`},

{phase:'pill-solution',phaseTxt:'Same rules, new body #3',title:'Sudoku Solver &mdash; one invariant, three clauses',desc:'Fill a 9&times;9 grid so every row, column, and 3&times;3 box holds 1&ndash;9 exactly once. The invariant is the <em>same</em> "legal partial solution" &mdash; it just now means <strong>three simultaneous clauses</strong>, each checked in O(1) with a per-row, per-column, per-box set.',
code:{h:'solve_sudoku.py',b:`def solve_sudoku(board):
    rows = [set() for _ in range(9)]
    cols = [set() for _ in range(9)]
    box  = [set() for _ in range(9)]
    empties = []
    for r in range(9):
        for c in range(9):
            v = board[r][c]
            if v == '.': empties.append((r, c))
            else: rows[r].add(v); cols[c].add(v); box[r//3*3 + c//3].add(v)
    def place(k):
        if k == len(empties):
            <span class="hi-g">return True</span>                    <span class="cm"># HARVEST: no empties left</span>
        r, c = empties[k]; b = r//3*3 + c//3
        for d in '123456789':
            <span class="hi-b">if d in rows[r] or d in cols[c] or d in box[b]:
                continue</span>                     <span class="cm"># INVARIANT: 3 clauses hold</span>
            <span class="hi-y">rows[r].add(d); cols[c].add(d); box[b].add(d); board[r][c] = d   # CHOOSE
            if place(k + 1): return True                                 # EXPLORE
            rows[r].discard(d); cols[c].discard(d); box[b].discard(d); board[r][c] = '.'  # UNCHOOSE</span>
        return False
    place(0)`},

{phase:'pill-solution',phaseTxt:'Same rules, new body #4',title:'Palindrome Partitioning &mdash; backtracking composed with DP',desc:'Cut a string into pieces so that <strong>every piece is a palindrome</strong>, and return all such partitions. The prune is a single predicate &mdash; "is the next cut a palindrome" &mdash; and because it is asked repeatedly, we <strong>precompute it with DP</strong>. Backtracking composed with another pattern.',
code:{h:'partition.py',b:`def partition(s):
    n = len(s)
    <span class="cm"># DP prune table: pal[i][j] = s[i..j] is a palindrome</span>
    pal = [[False]*n for _ in range(n)]
    for i in range(n-1, -1, -1):
        for j in range(i, n):
            pal[i][j] = s[i] == s[j] and (j - i &lt; 2 or pal[i+1][j-1])
    path, res = [], []
    def cut(i):
        if i == n:
            <span class="hi-g">res.append(path[:])</span>         <span class="cm"># HARVEST: deep copy</span>
            return
        for j in range(i, n):
            <span class="hi-b">if not pal[i][j]:
                continue</span>                  <span class="cm"># INVARIANT: each piece is a palindrome</span>
            <span class="hi-y">path.append(s[i:j+1])          # CHOOSE
            cut(j + 1)                     # EXPLORE
            path.pop()</span>                    <span class="cm"># UNCHOOSE</span>
    cut(0)
    return res`},

let cur=0;
const visited=new Set([0]);

function renderDots(){
  const d=document.getElementById('dots');
  d.innerHTML='';
  S.forEach((_,i)=>{
    const e=document.createElement('div');
    e.className='dot'+(i===cur?' active':(visited.has(i)?' visited':''));
    e.onclick=()=>go(i);
    d.appendChild(e);
  });
}

function go(n){
  if(n<0||n>=S.length)return;
  cur=n; visited.add(n);
  const s=S[n];
  document.getElementById('step-label').textContent=`Step ${n+1} of ${S.length}`;
  document.getElementById('prog').style.width=((n+1)/S.length*100)+'%';
  document.getElementById('pb').disabled=n===0;
  const nb=document.getElementById('nb');
  nb.disabled=n===S.length-1;
  nb.textContent=n===S.length-1?'Done':'Next →';

  let h=`<div class="s-content"><span class="pill ${s.phase}">${s.phaseTxt}</span><div class="s-title">${s.title}</div><div class="s-desc">${s.desc}</div>`;
  if(s.principle) h+=`<div class="principle-box"><div class="p-lbl">${s.principle.lbl}</div><div class="p-txt">${s.principle.txt}</div></div>`;
  if(s.code&&s.dia){
    h+=`<div class="two-panel"><div class="panel"><div class="panel-h">${s.code.h}</div><div class="panel-b">${s.code.b}</div></div><div class="panel"><div class="panel-h">Visualization</div><div style="padding:12px 10px">${s.dia()}</div></div></div>`;
  } else if(s.code){
    h+=`<div class="full-panel"><div class="panel-h">${s.code.h}</div><div class="panel-b">${s.code.b}</div></div>`;
  } else if(s.dia){
    h+=`<div style="margin-bottom:14px">${s.dia()}</div>`;
  }
  if(s.extra) h+=s.extra();
  if(s.callout) h+=`<div class="callout ${s.callout.type}">${s.callout.text}</div>`;
  h+=`</div>`;
  document.getElementById('sc').innerHTML=h;
  renderDots();
}

function toggleTheme(){
  const html=document.documentElement;
  html.setAttribute('data-theme', html.getAttribute('data-theme')==='dark'?'':'dark');
}

document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight') go(cur+1);
  if(e.key==='ArrowLeft') go(cur-1);
});

go(0);
